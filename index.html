<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>単語テスト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
/* ============================================================
   Notion Design System
   ============================================================ */
:root {
  --font: 'Inter', -apple-system, system-ui, 'Segoe UI', Helvetica, Arial, sans-serif;

  /* Colors */
  --black:       rgba(0,0,0,0.95);
  --black-90:    rgba(0,0,0,0.9);
  --black-60:    rgba(0,0,0,0.6);
  --black-10:    rgba(0,0,0,0.1);
  --black-05:    rgba(0,0,0,0.05);
  --white:       #ffffff;
  --warm-white:  #f6f5f4;
  --warm-dark:   #31302e;
  --gray-500:    #615d59;
  --gray-300:    #a39e98;
  --notion-blue: #0075de;
  --active-blue: #005bab;
  --focus-blue:  #097fe8;
  --badge-bg:    #f2f9ff;
  --badge-text:  #097fe8;
  --teal:        #2a9d99;
  --green:       #1aae39;
  --orange:      #dd5b00;
  --border:      1px solid rgba(0,0,0,0.1);

  /* Shadows */
  --shadow-card: rgba(0,0,0,0.04) 0px 4px 18px,
                 rgba(0,0,0,0.027) 0px 2.025px 7.847px,
                 rgba(0,0,0,0.02) 0px 0.8px 2.925px,
                 rgba(0,0,0,0.01) 0px 0.175px 1.041px;
  --shadow-deep: rgba(0,0,0,0.01) 0px 1px 3px,
                 rgba(0,0,0,0.02) 0px 3px 7px,
                 rgba(0,0,0,0.02) 0px 7px 15px,
                 rgba(0,0,0,0.04) 0px 14px 28px,
                 rgba(0,0,0,0.05) 0px 23px 52px;

  /* Radius */
  --r-micro:    4px;
  --r-standard: 8px;
  --r-card:     12px;
  --r-large:    16px;
  --r-pill:     9999px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  font-size: 16px;
  font-weight: 400;
  line-height: 1.5;
  color: var(--black);
  background: var(--warm-white);
  -webkit-font-smoothing: antialiased;
}

/* ── Page shell ── */
.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 16px 80px;
}

/* ── Top nav bar ── */
.topbar {
  width: 100%;
  max-width: 680px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 40px;
}
.topbar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}
.topbar-logo svg { width: 28px; height: 28px; flex-shrink: 0; }
.topbar-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--black);
  letter-spacing: -0.1px;
}
.topbar-guide {
  font-size: 14px;
  font-weight: 500;
  color: var(--gray-500);
  text-decoration: none;
  padding: 5px 12px;
  border-radius: var(--r-micro);
  transition: background 0.15s, color 0.15s;
}
.topbar-guide:hover { background: var(--black-05); color: var(--black); }

/* ── Card ── */
.card {
  width: 100%;
  max-width: 680px;
  background: var(--white);
  border: var(--border);
  border-radius: var(--r-large);
  box-shadow: var(--shadow-card);
  padding: 32px;
}

/* ── Section header inside card ── */
.section-label {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.125px;
  color: var(--gray-300);
  text-transform: uppercase;
  margin-bottom: 12px;
}

/* ── Page title ── */
.page-title {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.625px;
  line-height: 1.23;
  color: var(--black);
  margin-bottom: 4px;
}
.page-subtitle {
  font-size: 14px;
  font-weight: 400;
  color: var(--gray-500);
  margin-bottom: 28px;
}

/* ── Divider ── */
.divider {
  border: none;
  border-top: var(--border);
  margin: 24px 0;
}

/* ── Dataset selector ── */
.dataset-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 4px;
}
.ds-btn {
  position: relative;
  flex: 1;
  min-width: 140px;
  padding: 12px 14px;
  background: var(--white);
  border: var(--border);
  border-radius: var(--r-card);
  cursor: pointer;
  text-align: left;
  font-family: var(--font);
  transition: box-shadow 0.15s, border-color 0.15s;
}
.ds-btn:hover { box-shadow: var(--shadow-card); border-color: rgba(0,0,0,0.2); }
.ds-btn.active {
  border-color: var(--notion-blue);
  box-shadow: 0 0 0 1px var(--notion-blue), var(--shadow-card);
}
.ds-btn.loading { opacity: 0.5; pointer-events: none; }
.ds-btn .ds-name {
  font-size: 14px; font-weight: 600; color: var(--black); display: block;
}
.ds-btn .ds-count {
  font-size: 12px; font-weight: 400; color: var(--gray-300);
  margin-top: 2px; display: block;
}
.ds-btn.active .ds-count { color: var(--notion-blue); }
.ds-del {
  position: absolute; top: 8px; right: 10px;
  font-size: 12px; color: var(--gray-300); cursor: pointer;
  line-height: 1; padding: 2px 3px; border-radius: 3px;
  transition: background 0.1s, color 0.1s;
}
.ds-del:hover { background: #fef2f2; color: #ef4444; }
.ds-add {
  flex: 1; min-width: 140px; padding: 12px 14px;
  background: var(--white); border: 1px dashed rgba(0,0,0,0.2);
  border-radius: var(--r-card); cursor: pointer;
  font-family: var(--font); font-size: 14px; font-weight: 500;
  color: var(--gray-500); text-align: left;
  display: flex; align-items: center; gap: 7px;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.ds-add:hover { border-color: var(--notion-blue); color: var(--notion-blue); background: var(--badge-bg); }
.ds-add .plus { font-size: 16px; line-height: 1; font-weight: 400; }
.ds-info {
  font-size: 12px; font-weight: 400; color: var(--gray-300);
  margin-top: 6px; min-height: 16px;
}

/* ── Form rows ── */
.form-block { margin-bottom: 20px; }
.form-block:last-child { margin-bottom: 0; }
.form-row-label {
  font-size: 14px; font-weight: 600; color: var(--black);
  margin-bottom: 8px; display: block;
}
.range-inputs {
  display: flex; align-items: center; gap: 10px;
}
.range-inputs input[type=number] {
  width: 88px; padding: 7px 10px;
  border: var(--border); border-radius: var(--r-micro);
  font-family: var(--font); font-size: 15px; font-weight: 500;
  color: var(--black); background: var(--white);
  text-align: center; outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.range-inputs input[type=number]:focus {
  border-color: var(--focus-blue);
  box-shadow: 0 0 0 2px rgba(9,127,232,0.2);
}
.range-sep { font-size: 14px; color: var(--gray-300); font-weight: 400; }

/* ── Radio pills ── */
.radio-pills { display: flex; flex-wrap: wrap; gap: 6px; }
.radio-pill input { display: none; }
.radio-pill label {
  display: inline-block; padding: 5px 14px;
  border: var(--border); border-radius: var(--r-pill);
  font-size: 14px; font-weight: 500; color: var(--gray-500);
  cursor: pointer; transition: all 0.15s; user-select: none;
  background: var(--white);
}
.radio-pill label:hover { border-color: rgba(0,0,0,0.25); color: var(--black); }
.radio-pill input:checked + label {
  background: var(--badge-bg); border-color: var(--notion-blue);
  color: var(--notion-blue); font-weight: 600;
}

/* Count field */
.count-field {
  display: flex; align-items: center; gap: 8px; margin-top: 10px;
}
.count-field input[type=number] {
  width: 80px; padding: 7px 10px;
  border: var(--border); border-radius: var(--r-micro);
  font-family: var(--font); font-size: 15px; font-weight: 500;
  color: var(--black); background: var(--white); text-align: center;
  outline: none; transition: border-color 0.15s, box-shadow 0.15s;
}
.count-field input[type=number]:focus {
  border-color: var(--focus-blue); box-shadow: 0 0 0 2px rgba(9,127,232,0.2);
}
.count-field input:disabled { background: var(--warm-white); color: var(--gray-300); cursor: not-allowed; }
.count-unit { font-size: 14px; color: var(--gray-500); font-weight: 400; }

/* Info badge */
.info-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--badge-bg); color: var(--badge-text);
  border-radius: var(--r-pill); padding: 3px 10px;
  font-size: 12px; font-weight: 600; letter-spacing: 0.125px;
  margin-top: 10px;
}

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px; padding: 8px 16px; border-radius: var(--r-micro);
  font-family: var(--font); font-size: 15px; font-weight: 600;
  cursor: pointer; border: 1px solid transparent;
  transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
  text-decoration: none; white-space: nowrap;
}
.btn:active { transform: scale(0.96); }
.btn-primary {
  background: var(--notion-blue); color: var(--white);
}
.btn-primary:hover { background: var(--active-blue); }
.btn-secondary {
  background: var(--black-05); color: var(--black);
  border-color: transparent;
}
.btn-secondary:hover { background: rgba(0,0,0,0.08); }
.btn-ghost {
  background: transparent; color: var(--black);
  border-color: var(--black-10);
}
.btn-ghost:hover { background: var(--black-05); }
.btn-success {
  background: #e8f9ee; color: #166534;
  border-color: rgba(26,174,57,0.25);
}
.btn-success:hover { background: #d0f2da; }
.btn-full { width: 100%; }
.btn-lg { padding: 10px 20px; font-size: 15px; }

/* Generate button block */
.generate-wrap {
  margin-top: 28px; display: flex; flex-direction: column; gap: 10px;
}

/* ── Voice button ── */
.voice-btn {
  width: 100%; display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; background: var(--white);
  border: var(--border); border-radius: var(--r-card);
  font-family: var(--font); font-size: 14px; font-weight: 500;
  color: var(--gray-500); cursor: pointer;
  transition: all 0.15s;
}
.voice-btn:hover { border-color: rgba(0,0,0,0.2); color: var(--black); box-shadow: var(--shadow-card); }
.voice-btn.listening {
  border-color: #ef4444; background: #fef2f2; color: #ef4444;
  animation: pulse 1.2s ease-in-out infinite;
}
.voice-btn.unsupported { opacity: 0.4; cursor: not-allowed; }
.voice-btn .mic-icon { font-size: 17px; flex-shrink: 0; }
.voice-btn .mic-hint { font-size: 12px; color: var(--gray-300); margin-left: auto; }
.voice-btn.listening .mic-hint { color: #fca5a5; }
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.2); }
  50%      { box-shadow: 0 0 0 6px rgba(239,68,68,0); }
}

/* Voice preview */
.voice-preview {
  display: none;
  background: #f0fdf4;
  border: 1px solid rgba(22,163,74,0.3);
  border-radius: var(--r-card);
  padding: 14px 16px;
  font-size: 14px;
}
.voice-heard {
  font-size: 12px; color: var(--gray-500); margin-bottom: 10px;
}
.voice-heard em { font-style: normal; color: var(--black); font-weight: 500; }
.voice-table { width: 100%; border-collapse: collapse; }
.voice-table td { padding: 2px 4px; font-size: 13px; }
.voice-table td:first-child { color: var(--gray-500); width: 110px; font-weight: 500; }
.voice-table td:last-child  { color: #166534; font-weight: 600; }
.voice-actions { display: flex; gap: 8px; margin-top: 12px; }
.voice-actions .btn { flex: 1; padding: 7px 12px; font-size: 13px; }

/* ── Upload Modal ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200; align-items: center; justify-content: center; padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--white); border-radius: var(--r-large);
  width: 100%; max-width: 480px;
  box-shadow: var(--shadow-deep);
  border: var(--border);
  overflow: hidden;
  animation: modal-in 0.18s ease;
}
@keyframes modal-in {
  from { opacity: 0; transform: scale(0.97) translateY(6px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-head {
  padding: 20px 24px 16px;
  border-bottom: var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-head h2 { font-size: 16px; font-weight: 700; letter-spacing: -0.1px; }
.modal-head button {
  background: none; border: none; cursor: pointer;
  font-size: 18px; color: var(--gray-300); padding: 2px 6px;
  border-radius: var(--r-micro); transition: background 0.1s, color 0.1s;
}
.modal-head button:hover { background: var(--black-05); color: var(--black); }
.modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
.modal-foot { padding: 14px 24px; border-top: var(--border); display: flex; gap: 8px; justify-content: flex-end; }

.field label { display: block; font-size: 14px; font-weight: 600; color: var(--black); margin-bottom: 6px; }
.field input[type=text] {
  width: 100%; padding: 8px 12px;
  border: var(--border); border-radius: var(--r-micro);
  font-family: var(--font); font-size: 14px; color: var(--black);
  outline: none; transition: border-color 0.15s, box-shadow 0.15s;
}
.field input[type=text]:focus {
  border-color: var(--focus-blue); box-shadow: 0 0 0 2px rgba(9,127,232,0.18);
}
.field input[type=text]::placeholder { color: var(--gray-300); }

.drop-zone {
  border: 1px dashed rgba(0,0,0,0.2); border-radius: var(--r-card);
  padding: 28px 20px; text-align: center; cursor: pointer;
  background: var(--warm-white); transition: all 0.15s;
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: var(--notion-blue); background: var(--badge-bg);
}
.drop-zone.has-file { border-color: var(--green); border-style: solid; background: #f0fdf4; }
.drop-zone input[type=file] { display: none; }
.dz-icon { font-size: 30px; line-height: 1; }
.dz-text { font-size: 14px; font-weight: 500; color: var(--black); margin-top: 8px; }
.dz-sub  { font-size: 12px; color: var(--gray-300); margin-top: 3px; }

.format-hint {
  background: var(--warm-white); border: var(--border);
  border-radius: var(--r-standard); padding: 10px 12px;
  font-size: 12px; color: var(--gray-500); line-height: 1.6;
}
.format-hint code {
  background: var(--white); border: var(--border);
  padding: 1px 5px; border-radius: 3px; font-size: 11px;
  font-family: 'SF Mono', 'Fira Code', monospace;
}
.parse-ok    { font-size: 13px; font-weight: 600; color: #166534; margin-top: 6px; }
.parse-error { font-size: 13px; color: #dc2626; margin-top: 6px; }

/* Preview table */
.preview-wrap {
  border: var(--border); border-radius: var(--r-standard);
  overflow: hidden; max-height: 150px; overflow-y: auto;
}
.preview-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.preview-tbl th {
  background: var(--warm-white); padding: 6px 10px;
  text-align: left; font-weight: 600; font-size: 11px;
  letter-spacing: 0.125px; color: var(--gray-500);
  position: sticky; top: 0;
}
.preview-tbl td { padding: 5px 10px; border-top: var(--border); }

/* ── Test sheet ── */
.test-page {
  min-height: 100vh; background: var(--white);
}
.test-inner { max-width: 900px; margin: 0 auto; padding: 28px 32px; }
.test-head {
  display: flex; justify-content: space-between; align-items: flex-end;
  border-bottom: 2px solid var(--black); padding-bottom: 12px; margin-bottom: 4px;
}
.test-head h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.25px; }
.test-meta {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px; padding-top: 6px;
}
.test-meta-date { font-size: 12px; color: var(--gray-300); font-weight: 400; }
.test-meta-range { font-size: 12px; font-weight: 600; color: var(--gray-500); }
.score-display { font-size: 14px; font-weight: 700; color: var(--black); }

.test-grid { display: grid; }
.test-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.test-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.test-item { padding: 8px 10px; border-bottom: var(--border); }
.item-num { font-size: 11px; color: var(--gray-300); font-weight: 400; display: block; margin-bottom: 1px; }
.item-word { font-size: 17px; font-weight: 500; color: var(--black); line-height: 1.3; }
.answer-line { border-bottom: 1px solid rgba(0,0,0,0.15); height: 26px; margin-top: 4px; }
.answer-input {
  width: 100%; border: none; border-bottom: 1px solid rgba(0,0,0,0.15);
  font-family: var(--font); font-size: 14px; padding: 4px 0;
  color: var(--black); background: transparent; outline: none;
  transition: border-color 0.15s;
}
.answer-input:focus { border-bottom-color: var(--notion-blue); }
.answer-text { font-size: 13px; font-weight: 500; margin-top: 3px; }
.answer-correct { color: #166534; }
.answer-wrong   { color: #dc2626; }

/* Action bar */
.action-bar {
  position: sticky; bottom: 0; background: rgba(255,255,255,0.95);
  backdrop-filter: blur(8px); border-top: var(--border);
  padding: 12px 32px;
  display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
  max-width: 900px; margin: 0 auto;
}

/* ── Result screen ── */
.result-page {
  display: flex; align-items: center; justify-content: center;
  min-height: 80vh; padding: 40px 16px;
}
.result-card {
  background: var(--white); border: var(--border);
  border-radius: var(--r-large); box-shadow: var(--shadow-card);
  padding: 48px 40px; text-align: center;
  width: 100%; max-width: 440px;
}
.result-score {
  font-size: 64px; font-weight: 700;
  letter-spacing: -2.125px; line-height: 1;
  color: var(--notion-blue); margin: 16px 0 8px;
}
.result-title { font-size: 22px; font-weight: 700; letter-spacing: -0.25px; }
.result-pct { font-size: 16px; color: var(--gray-500); margin-bottom: 28px; }
.result-actions { display: flex; flex-direction: column; gap: 8px; }

/* ── Print ── */
@media print {
  body { background: #fff; }
  .topbar, .action-bar, .page { display: none !important; }
  .test-page { display: block !important; }
  .test-inner { padding: 8px; }
  .answer-input { display: none; }
  @page { margin: 10mm; }
}

/* ── Responsive ── */
@media (max-width: 640px) {
  .page { padding: 24px 12px 60px; }
  .card { padding: 20px; }
  .test-inner { padding: 14px; }
  .test-grid.cols-3 { grid-template-columns: 1fr 1fr; }
  .action-bar { padding: 10px 12px; }
  .result-card { padding: 32px 20px; }
  .result-score { font-size: 48px; }
}

/* hide test/result/card by default */
#testScreen   { display: none; }
#resultScreen { display: none; }
#cardScreen   { display: none; }

/* ── Card Mode ── */
.card-screen {
  min-height: 100vh; background: var(--warm-white);
  display: flex; flex-direction: column;
}
.card-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; background: var(--white); border-bottom: var(--border);
  gap: 8px;
}
.card-back-btn {
  background: none; border: none; cursor: pointer;
  font-size: 14px; font-weight: 500; color: var(--gray-500);
  padding: 6px 10px; border-radius: var(--r-micro); font-family: var(--font);
  transition: background 0.15s, color 0.15s; white-space: nowrap;
}
.card-back-btn:hover { background: var(--black-05); color: var(--black); }
.card-counter {
  font-size: 15px; font-weight: 700; color: var(--black); white-space: nowrap;
}
.card-ds-label {
  font-size: 12px; color: var(--gray-300); font-weight: 400;
  text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.card-progress-bar { height: 3px; background: var(--black-05); flex-shrink: 0; }
.card-progress-fill {
  height: 100%; background: var(--notion-blue); transition: width 0.35s ease;
}

/* Stage */
.card-stage {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 28px 16px 20px; gap: 20px;
}

/* 3-D flip */
.card-scene {
  width: 100%; max-width: 480px;
  perspective: 1200px;
  user-select: none;
  position: relative; /* needed for button overlay */
}
.card-tap-btn {
  position: absolute; inset: 0; z-index: 10;
  background: transparent; border: none; padding: 0; margin: 0;
  cursor: pointer; border-radius: var(--r-large);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.card-flip {
  width: 100%; min-height: 220px; position: relative;
  transform-style: preserve-3d;
  transition: transform 0.42s cubic-bezier(0.4, 0, 0.2, 1);
}
.card-flip.flipped { transform: rotateY(180deg); }

.card-face {
  position: absolute; inset: 0; min-height: 220px;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  border-radius: var(--r-large);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 28px 24px; gap: 10px;
  border: var(--border); box-shadow: var(--shadow-deep);
}
.card-face.front { background: var(--white); }
.card-face.back  {
  background: #f0fdf4; border-color: rgba(26,174,57,0.25);
  transform: rotateY(180deg);
}

.card-num-badge {
  position: absolute; top: 12px; left: 16px;
  font-size: 11px; color: var(--gray-300); font-weight: 400;
}
.card-side-label {
  font-size: 11px; font-weight: 600; letter-spacing: 0.125px;
  text-transform: uppercase; color: var(--gray-300);
}
.card-face.back .card-side-label { color: #6dbc87; }

.card-word {
  font-size: clamp(22px, 5.5vw, 34px);
  font-weight: 700; letter-spacing: -0.5px;
  color: var(--black); text-align: center; line-height: 1.2;
}
.card-face.back .card-word { color: #166534; }
.card-alt {
  font-size: 13px; color: #4a8c5c; font-weight: 400;
  text-align: center; line-height: 1.5;
}

/* Tap hint */
.card-hint {
  font-size: 13px; color: var(--gray-300);
  display: flex; align-items: center; gap: 5px;
  animation: hint-pulse 2s ease-in-out infinite;
  min-height: 22px;
}
@keyframes hint-pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

/* ○ / ✕ action buttons */
.card-actions {
  display: flex; gap: 12px;
  width: 100%; max-width: 480px;
  opacity: 0; transform: translateY(10px);
  transition: opacity 0.22s ease, transform 0.22s ease;
  pointer-events: none;
}
.card-actions.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
.card-btn-unknown {
  flex: 1; padding: 13px 10px;
  background: #fef2f2; border: 1px solid rgba(239,68,68,0.3);
  border-radius: var(--r-card); cursor: pointer;
  font-family: var(--font); font-size: 14px; font-weight: 700;
  color: #dc2626; text-align: center;
  transition: background 0.12s, transform 0.1s;
}
.card-btn-unknown:active { transform: scale(0.97); background: #fee2e2; }
.card-btn-know {
  flex: 1; padding: 13px 10px;
  background: #f0fdf4; border: 1px solid rgba(26,174,57,0.3);
  border-radius: var(--r-card); cursor: pointer;
  font-family: var(--font); font-size: 14px; font-weight: 700;
  color: #166534; text-align: center;
  transition: background 0.12s, transform 0.1s;
}
.card-btn-know:active { transform: scale(0.97); background: #dcfce7; }

/* ← → navigation */
.card-nav { display: flex; gap: 8px; width: 100%; max-width: 480px; }
.card-nav-btn {
  flex: 1; padding: 9px 12px;
  background: var(--white); border: var(--border);
  border-radius: var(--r-standard); cursor: pointer;
  font-family: var(--font); font-size: 14px; font-weight: 500;
  color: var(--gray-500); text-align: center;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
}
.card-nav-btn:hover:not(:disabled) { border-color: rgba(0,0,0,0.2); color: var(--black); }
.card-nav-btn:disabled { opacity: 0.28; cursor: default; }

/* Result stats row */
.card-stats {
  display: flex; gap: 20px; justify-content: center;
  flex-wrap: wrap; margin-bottom: 24px; font-size: 14px;
}
.card-stat-know    { color: #166534; font-weight: 700; }
.card-stat-unknown { color: #dc2626; font-weight: 700; }
.card-stat-skip    { color: var(--gray-300); font-weight: 600; }

/* ── Topbar actions group ── */
.topbar-actions { display: flex; align-items: center; gap: 4px; }
.topbar-btn {
  font-size: 14px; font-weight: 500; color: var(--gray-500);
  text-decoration: none; padding: 5px 12px;
  border-radius: var(--r-micro);
  transition: background 0.15s, color 0.15s;
  background: none; border: none; cursor: pointer;
  font-family: var(--font); white-space: nowrap;
}
.topbar-btn:hover { background: var(--black-05); color: var(--black); }

/* ── Log modal ── */
.log-table-wrap {
  border: var(--border); border-radius: var(--r-standard);
  overflow: hidden; max-height: 320px; overflow-y: auto;
}
.log-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.log-tbl th {
  background: var(--warm-white); padding: 7px 10px; text-align: left;
  font-weight: 600; font-size: 11px; letter-spacing: 0.125px;
  color: var(--gray-500); position: sticky; top: 0;
  border-bottom: var(--border);
}
.log-tbl td { padding: 6px 10px; border-top: var(--border); vertical-align: middle; }
.log-tbl tr:hover td { background: var(--warm-white); }
.log-del-btn {
  background: none; border: none; cursor: pointer;
  font-size: 12px; color: var(--gray-300); padding: 2px 5px;
  border-radius: 3px; transition: background 0.1s, color 0.1s;
}
.log-del-btn:hover { background: #fef2f2; color: #ef4444; }
.log-empty {
  padding: 32px 20px; text-align: center;
  font-size: 14px; color: var(--gray-300);
}
.log-student-wrap { margin-bottom: 16px; }
</style>

<!-- ================================================================ JavaScript ================================================================ -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
// ── Dataset management ──────────────────────────────────
const BUILTIN = [
  { id:'j1',        label:'英検 準１級', file:'words_j1.js'        },
  { id:'grit2500',  label:'GRIT2500',   file:'words_grit2500.js'  },
  { id:'eiken2',    label:'英検 ２級',   file:'words_eiken2.js'    },
  { id:'eiken_pre2',label:'英検 準２級', file:'words_eiken_pre2.js'},
  { id:'eiken3',    label:'英検 ３級',   file:'words_eiken3.js'    },
];
const STORAGE_KEY = 'customDatasets_v1';
let currentDS = null, loadedCache = {}, parsedWords = [];

const getCustoms  = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); } catch { return []; } };
const saveCustoms = list => localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
const allDatasets = () => [...BUILTIN.map(d=>({...d,custom:false})), ...getCustoms().map(d=>({...d,custom:true}))];

function buildGrid() {
  const grid = document.getElementById('datasetGrid');
  grid.innerHTML = '';
  allDatasets().forEach(ds => {
    const cached = loadedCache[ds.id];
    const count  = cached ? (cached.total > 0 ? `${cached.total}語` : '（準備中）') : '読み込み中…';
    const btn = document.createElement('button');
    btn.className = 'ds-btn' + (cached&&cached.total===0?' loading':'') + (currentDS&&currentDS.id===ds.id?' active':'');
    btn.id = 'dsbtn-'+ds.id;
    btn.onclick = () => selectDS(ds.id);
    btn.innerHTML = `<span class="ds-name">${ds.label}</span><span class="ds-count">${count}</span>`;
    if (ds.custom) {
      const x = document.createElement('span');
      x.className = 'ds-del'; x.textContent = '✕'; x.title = '削除';
      x.onclick = e => { e.stopPropagation(); deleteDS(ds.id); };
      btn.appendChild(x);
    }
    grid.appendChild(btn);
  });
  const add = document.createElement('button');
  add.className = 'ds-add'; add.onclick = openModal;
  add.innerHTML = '<span class="plus">＋</span>教材を追加';
  grid.appendChild(add);
}

function deleteDS(id) {
  if (!confirm('この教材を削除しますか？')) return;
  saveCustoms(getCustoms().filter(d => d.id !== id));
  delete loadedCache[id];
  if (currentDS?.id === id) currentDS = null;
  buildGrid();
  if (!currentDS) selectDS('j1');
}

function selectDS(id) {
  if (loadedCache[id]) { applyDS(loadedCache[id]); return; }
  const ds = allDatasets().find(d => d.id === id);
  if (!ds) return;
  if (ds.custom) {
    const s = getCustoms().find(d => d.id === id);
    if (s) { loadedCache[id] = s; applyDS(s); return; }
  }
  const el = document.getElementById('dsbtn-'+id);
  if (el) el.classList.add('loading');
  const sc = document.createElement('script');
  sc.src = ds.file + '?v=2';
  sc.onload = () => {
    loadedCache[id] = window.DATASET; delete window.DATASET;
    buildGrid(); applyDS(loadedCache[id]);
  };
  sc.onerror = () => {
    loadedCache[id] = { id, label:ds.label, total:0, words:[] };
    buildGrid(); applyDS(loadedCache[id]);
  };
  document.head.appendChild(sc);
}

function applyDS(ds) {
  currentDS = ds;
  document.getElementById('appTitle').textContent    = ds.label;
  document.getElementById('appSubtitle').textContent = ds.total > 0
    ? `${ds.total}語が利用可能です`
    : 'データが未登録です';
  const max = ds.total || 1;
  document.getElementById('rangeTo').max   = max;
  document.getElementById('rangeFrom').max = max;
  if (+document.getElementById('rangeTo').value > max)
    document.getElementById('rangeTo').value = Math.min(100, max);
  const locked = ds.total === 0;
  document.getElementById('settingsForm').style.opacity       = locked ? '.4' : '';
  document.getElementById('settingsForm').style.pointerEvents = locked ? 'none' : '';
  buildGrid(); updateInfo();
}

// ビルトイン教材をバックグラウンドで先読み（applyせず語数表示だけ更新）
function prefetchDS(id) {
  if (loadedCache[id]) return;
  const ds = BUILTIN.find(d => d.id === id);
  if (!ds) return;
  const sc = document.createElement('script');
  sc.src = ds.file + '?v=2';
  sc.onload = () => { loadedCache[id] = window.DATASET; delete window.DATASET; buildGrid(); };
  sc.onerror = () => { loadedCache[id] = { id, label:ds.label, total:0, words:[] }; buildGrid(); };
  document.head.appendChild(sc);
}

window.addEventListener('DOMContentLoaded', () => {
  // ビルトイン教材と同名のカスタム教材を自動削除（重複防止）
  const builtinLabels = new Set(BUILTIN.map(d => d.label));
  const allCustoms = getCustoms();
  const cleaned = allCustoms.filter(d => !builtinLabels.has(d.label));
  if (cleaned.length !== allCustoms.length) saveCustoms(cleaned);
  // カスタム教材をメモリキャッシュに事前ロード
  cleaned.forEach(ds => { loadedCache[ds.id] = ds; });
  buildGrid();
  selectDS('j1');
  // j1以外のビルトイン教材をバックグラウンドで先読み
  BUILTIN.filter(d => d.id !== 'j1').forEach(d => prefetchDS(d.id));
});

// ── Voice ───────────────────────────────────────────────
let recog = null, listening = false;
function initSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('btnMic').classList.add('unsupported');
    document.getElementById('micLabel').textContent = '音声入力は非対応です';
    document.getElementById('micHint').textContent  = 'Chrome / Edge を推奨します';
    return;
  }
  recog = new SR(); recog.lang = 'ja-JP'; recog.interimResults = false; recog.maxAlternatives = 3;
  recog.onresult = e => { stopListen(); showVoicePreview(e.results[0][0].transcript, parseVoice(e.results[0][0].transcript)); };
  recog.onerror  = e => { stopListen(); if (e.error==='no-speech') showVoiceErr('音声が認識できませんでした。'); if (e.error==='not-allowed') showVoiceErr('マイクのアクセスが拒否されています。'); };
  recog.onend    = () => stopListen();
}
function toggleVoice() { if (document.getElementById('btnMic').classList.contains('unsupported')) return; if (!recog) initSpeech(); listening ? stopListen() : startListen(); }
function startListen() {
  const btn = document.getElementById('btnMic');
  btn.classList.add('listening');
  document.getElementById('micLabel').textContent = '聞いています…';
  document.getElementById('micHint').textContent  = 'もう一度押すと停止';
  document.getElementById('voicePreview').style.display = 'none';
  listening = true; try { recog.start(); } catch(_){}
}
function stopListen() {
  listening = false;
  const btn = document.getElementById('btnMic');
  btn.classList.remove('listening');
  document.getElementById('micLabel').textContent = '音声で設定する';
  document.getElementById('micHint').textContent  = '例：「1番から100番、40問、ランダム、画面で」';
  try { recog.stop(); } catch(_){}
}
function parseVoice(t) {
  const r = {};
  const m = t.match(/(\d+)\s*(?:番|問目|語目)?(?:から|〜|～)\s*(\d+)/);
  if (m) { r.rangeFrom=+m[1]; r.rangeTo=+m[2]; }
  const c = t.match(/(\d+)\s*(?:問|語|個)/);
  if (c) { r.wordCount=+c[1]; r.countMode='random'; }
  if (/全[部て]|すべて|全問/.test(t)) { r.countMode='all'; delete r.wordCount; }
  if (/ランダム|バラバラ|シャッフル/.test(t)) r.sortMode='random';
  if (/順番通り|順番に|そのまま/.test(t)) r.sortMode='sequential';
  const col = t.match(/([2３3二三])\s*列/);
  if (col) r.cols = /[3３三]/.test(col[1]) ? 3 : 2;
  if (/日本語.*英語|日英/.test(t))  r.direction='ja2en';
  if (/英語.*日本語|英和/.test(t))  r.direction='en2ja';
  if (/印刷|プリント|紙/.test(t))   r.mode='print';
  if (/画面|入力|インタラクティブ/.test(t)) r.mode='interactive';
  if (/作成|始め|スタート|テスト/.test(t)) r.trigger=true;
  return r;
}
function showVoicePreview(heard, p) {

  if (Object.keys(p).filter(k=>k!=='trigger').length === 0) {

  if (p.countMode==='all')  rows+=`<tr><td>出題数</td><td>全て（${Math.max(0,to-from+1)}語）</td></tr>`;

  if (p.sortMode)    rows+=`<tr><td>出題順</td><td>${p.sortMode==='random'?'ランダム':'順番通り'}</td></tr>`;

document.getElementById('uploadModal').addEventListener('click', e => { if(e.target===document.getElementById('uploadModal')) closeModal(); });
function onDragOver(e) { e.preventDefault(); document.getElementById('dropZone').classList.add('drag-over'); }
function onDragLeave()  { document.getElementById('dropZone').classList.remove('drag-over'); }
function onDrop(e) { e.preventDefault(); document.getElementById('dropZone').classList.remove('drag-over'); if(e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); }
function onFileSelect(e) { if(e.target.files[0]) processFile(e.target.files[0]); }
function processFile(file) {
  const ext=file.name.split('.').pop().toLowerCase();
  const dz=document.getElementById('dropZone');
  dz.querySelector('.dz-text').textContent='📂 '+file.name;
  dz.querySelector('.dz-sub').textContent=(file.size/1024).toFixed(1)+' KB';
  document.getElementById('parseMsg').innerHTML='<span style="color:var(--gray-300);font-size:13px;">解析中…</span>';
  document.getElementById('previewWrap').style.display='none';
  const r=new FileReader();
  if (ext==='csv') { r.onload=e=>parseCSV(e.target.result); r.readAsText(file,'UTF-8'); }
  else if (ext==='xlsx'||ext==='xls') { r.onload=e=>parseExcel(e.target.result); r.readAsArrayBuffer(file); }
  else { showParseErr('対応していないファイル形式です（CSV または Excel）'); }
}
function parseCSV(text) {
  const lines=text.replace(/^﻿/,'').split(/\r?\n/).filter(l=>l.trim());
  const rows=lines.map(l=>{
    // カンマ区切り＋ダブルクォート対応の正しいCSVパーサー
    const result=[]; let cur='', inQ=false;
    for (let i=0;i<l.length;i++) {
      const c=l[i];
      if (inQ) {
        if (c==='"' && l[i+1]==='"') { cur+='"'; i++; }
        else if (c==='"') inQ=false;
        else cur+=c;
      } else {
        if (c==='"') inQ=true;
        else if (c===',') { result.push(cur.trim()); cur=''; }
        else cur+=c;
      }
    }
    result.push(cur.trim());
    return result;
  });
  applyRows(rows);
}
function parseExcel(buf) {
  try { const wb=XLSX.read(buf,{type:'array'}); const ws=wb.Sheets[wb.SheetNames[0]]; applyRows(XLSX.utils.sheet_to_json(ws,{header:1,defval:''})); }
  catch(e) { showParseErr('Excelファイルの読み込みに失敗: '+e.message); }
}
function applyRows(rows) {
  let start=0;
  if (rows.length>0 && !/^\d+$/.test(String(rows[0][0]||'').trim()) && rows.length>1) start=1;
  const words=[];
  for (let i=start;i<rows.length;i++) {
    const a=String(rows[i][0]||'').trim(), b=String(rows[i][1]||'').trim();
    if (a&&b) words.push({id:words.length+1,en:a,ja:b});
  }
  if (words.length<2) { showParseErr(`有効な単語行が見つかりませんでした（${words.length}行）`); return; }
  parsedWords=words;
  document.getElementById('dropZone').classList.add('has-file');
  document.getElementById('parseMsg').innerHTML=`<div class="parse-ok">✔ ${words.length}語を読み込みました</div>`;
  const prev=words.slice(0,5);
  document.getElementById('previewWrap').innerHTML=`<table class="preview-tbl"><tr><th>#</th><th>問題文</th><th>解答</th></tr>${prev.map(w=>`<tr><td>${w.id}</td><td>${esc(w.en)}</td><td>${esc(w.ja)}</td></tr>`).join('')}${words.length>5?`<tr><td colspan="3" style="text-align:center;font-size:12px;color:var(--gray-300);padding:6px;">…他 ${words.length-5} 語</td></tr>`:''}</table>`;
  document.getElementById('previewWrap').style.display='block';
  validateModal();
}
function showParseErr(msg) {
  document.getElementById('parseMsg').innerHTML=`<div class="parse-error">⚠ ${msg}</div>`;
  document.getElementById('previewWrap').style.display='none';
  document.getElementById('dropZone').classList.remove('has-file');

}

  document.getElementById('btnConfirm').disabled=!(document.getElementById('dsName').value.trim()&&parsedWords.length>0);

function generateTest() {
  if (!currentDS||currentDS.total===0) { alert('教材データを選択してください。'); return; }
  const from     =+document.getElementById('rangeFrom').value;
  const to       =+document.getElementById('rangeTo').value;

  const sortMode =document.querySelector('input[name=sortMode]:checked').value;

  isInteractive  =modeVal==='interactive';

  let pool=currentDS.words.filter(w=>w.id>=from&&w.id<=to);

    n=+document.getElementById('wordCount').value;

    rangeTo:   to,

    mode:      modeVal,
    cols:      cols

function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} }

// ── Scoring (A+B hybrid) ──────────────────────────────────
function normalize(s){
  return s.replace(/[\s　、，,。．.…～〜・「」『』（）()＝=：:；;！!？?]/g,'')
    .replace(/^(を|に|と|が|で|は|へ|の|も)+/g,'')
    .replace(/(を|に|と|が|で|は|へ|の|も|から|まで|より|など|ば|て|た|だ)+$/g,'')
    .replace(/(を|に|と|が|で|は|へ|の|も|から|まで|より|など|ば)/g,'')
    .replace(/していく|してくる|しておく|している/g,'する')
    .replace(/させる|される|された|させた/g,'する')
    .replace(/った|んだ|いた|した/g,'る')
    .replace(/ない$/,'').replace(/こと$|もの$|ところ$/,'');
}
function cores(s){const m=s.match(/[一-龯㐀-䶿]+|[゠-ヿ]+/g);return m?m.filter(c=>c.length>=2):[];}
function lev(a,b){const m=a.length,n=b.length,dp=Array.from({length:m+1},()=>Array(n+1).fill(0));for(let i=0;i<=m;i++)dp[i][0]=i;for(let j=0;j<=n;j++)dp[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);return dp[m][n];}
function sim(a,b){if(!a||!b)return 0;return 1-lev(a,b)/Math.max(a.length,b.length);}
function isCorrect(userAns,expected,dir,word){
  const ans=userAns.trim(); if(!ans)return false;
  if(dir==='ja2en') return ans.toLowerCase()===expected.toLowerCase();
  const nA=normalize(ans),nE=normalize(expected);
  if(nA===nE)return true;
  const parts=expected.split(/[、，,／/]/).map(p=>p.trim()).filter(Boolean);
  if(parts.some(p=>normalize(p)===nA))return true;
  if(word?.alt?.some(a=>normalize(a)===nA))return true;
  const aC=cores(ans),eC=cores(expected);
  if(eC.length>0&&aC.length>0){const matched=eC.filter(ec=>aC.some(ac=>ac===ec||ac.includes(ec)||ec.includes(ac))).length;if(matched>=Math.ceil(eC.length/2)&&matched>=1)return true;}
  if(parts.some(p=>sim(normalize(p),nA)>=0.6))return true;
  if(word?.alt?.some(a=>sim(normalize(a),nA)>=0.6))return true;
  return false;
}

function checkAnswers(){
  let correct=0;
  document.querySelectorAll('.answer-input').forEach((input,i)=>{
    const w=testWords[i],expected=direction==='en2ja'?w.ja:w.en,userAns=input.value.trim();
    const d=document.createElement('div'); d.className='answer-text';
    if(!userAns){d.classList.add('answer-wrong');d.textContent='→ '+expected;}
    else if(isCorrect(userAns,expected,direction,w)){d.classList.add('answer-correct');d.textContent='○ '+expected;correct++;input.style.borderBottomColor='#166534';}
    else{d.classList.add('answer-wrong');d.textContent='✕ → '+expected;input.style.borderBottomColor='#dc2626';}
    input.disabled=true; input.parentElement.appendChild(d);
  });
  const pct=Math.round(correct/testWords.length*100);
  document.getElementById('scoreDisplay').textContent=`${correct}/${testWords.length}`;
  document.getElementById('resultInner').innerHTML=`
    <div class="result-card">
      <div class="result-title">採点結果</div>
      <div class="result-score">${correct}/${testWords.length}</div>
      <div class="result-pct">${pct}% 正解</div>
      <div class="result-actions">
        <button class="btn btn-primary btn-full" onclick="retryWrong()">間違えた問題を再テスト</button>
        <button class="btn btn-secondary btn-full" onclick="backToSettings()">設定に戻る</button>
      </div>
    </div>`;
  document.getElementById('resultScreen').style.display='block';
  document.getElementById('resultScreen').scrollIntoView({behavior:'smooth'});
}

function retryWrong(){
  const wrong=[];
  document.querySelectorAll('.answer-input').forEach((input,i)=>{
    const w=testWords[i],expected=direction==='en2ja'?w.ja:w.en;
    if(!isCorrect(input.value.trim(),expected,direction,w))wrong.push(w);
  });
  if(wrong.length===0){alert('全問正解です！');return;}
  testWords=wrong; isInteractive=true;
  const cols=document.querySelector('.test-grid').classList.contains('cols-3')?3:2;
  renderTest(cols,Math.min(...wrong.map(w=>w.id)),Math.max(...wrong.map(w=>w.id)));
}

// ── Card Mode ─────────────────────────────────────────────
let cardIndex = 0, cardFlipped = false, cardResults = [];
let _cardTouchX = 0, _cardTouchY = 0, _cardSwipeLocked = false;

function startCardMode() {
  cardIndex   = 0;
  cardFlipped = false;
  cardResults = new Array(testWords.length).fill(null);

  document.getElementById('cardDsLabel').textContent = currentDS.label;
  document.getElementById('settingsScreen').style.display = 'none';
  document.getElementById('testScreen').style.display    = 'none';
  document.getElementById('resultScreen').style.display  = 'none';
  document.getElementById('cardScreen').style.display    = 'block';
  window.scrollTo(0, 0);

  // Touch / swipe / tap handling — on the <button> overlay for reliable iOS Safari response
  const btn = document.getElementById('cardTapBtn');
  btn.ontouchstart = e => {
    _cardTouchX = e.touches[0].clientX;
    _cardTouchY = e.touches[0].clientY;
    _cardSwipeLocked = false;
  };
  btn.ontouchend = e => {
    if (_cardSwipeLocked) return;
    const dx = e.changedTouches[0].clientX - _cardTouchX;
    const dy = e.changedTouches[0].clientY - _cardTouchY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 48) {
      _cardSwipeLocked = true;
      e.preventDefault();
      dx > 0 ? prevCard() : nextCard();
    } else if (Math.abs(dx) < 12 && Math.abs(dy) < 12) {
      e.preventDefault(); // prevent subsequent click (avoids double-flip)
      flipCard();
    }
  };
  btn.onclick = () => { if (!_cardSwipeLocked) flipCard(); }; // desktop fallback

  renderCard();
}

function renderCard() {
  const w     = testWords[cardIndex];
  const q     = direction === 'en2ja' ? w.en : w.ja;
  const ans   = direction === 'en2ja' ? w.ja : w.en;
  const total = testWords.length;

  // Reset flip
  cardFlipped = false;
  document.getElementById('cardFlipEl').classList.remove('flipped');
  document.getElementById('cardActions').classList.remove('visible');
  document.getElementById('cardHint').style.visibility = 'visible';

  // Populate front
  document.getElementById('cardFrontNum').textContent   = '#' + w.id;
  document.getElementById('cardFrontLabel').textContent = direction === 'en2ja' ? '英語' : '日本語';
  document.getElementById('cardFrontWord').textContent  = q;

  // Populate back
  document.getElementById('cardBackNum').textContent  = '#' + w.id;
  document.getElementById('cardBackWord').textContent = ans;
  const altEl = document.getElementById('cardAlt');
  if (direction === 'en2ja' && w.alt && w.alt.length > 0) {
    altEl.textContent    = '別解：' + w.alt.slice(0, 3).join(' / ');
    altEl.style.display  = '';
  } else {
    altEl.style.display = 'none';
  }

  // Progress
  document.getElementById('cardCounter').textContent           = `${cardIndex + 1} / ${total}`;
  document.getElementById('cardProgressFill').style.width      = `${(cardIndex / total) * 100}%`;
  document.getElementById('cardPrevBtn').disabled              = cardIndex === 0;
  document.getElementById('cardNextBtn').textContent           = cardIndex === total - 1 ? '結果を見る →' : '次 →';

  // Already-marked indicator
  const res = cardResults[cardIndex];
  const flip = document.getElementById('cardFlipEl');
  flip.style.outline = res === 'know' ? '2px solid #1aae39'
                     : res === 'unknown' ? '2px solid #ef4444' : 'none';
  flip.style.borderRadius = '16px';
}

function flipCard() {
  cardFlipped = !cardFlipped;
  document.getElementById('cardFlipEl').classList.toggle('flipped', cardFlipped);
  if (cardFlipped) {
    document.getElementById('cardActions').classList.add('visible');
    document.getElementById('cardHint').style.visibility = 'hidden';
  } else {
    document.getElementById('cardActions').classList.remove('visible');
    document.getElementById('cardHint').style.visibility = 'visible';
  }
}

function markCard(result) {
  cardResults[cardIndex] = result;
  // brief visual feedback, then advance
  setTimeout(() => {
    if (cardIndex < testWords.length - 1) { cardIndex++; renderCard(); }
    else showCardResult();
  }, 150);
}

function prevCard() {
  if (cardIndex > 0) { cardIndex--; renderCard(); }
}

function nextCard() {
  if (cardIndex < testWords.length - 1) { cardIndex++; renderCard(); }
  else showCardResult();
}

function showCardResult() {
  const total   = testWords.length;
  const known   = cardResults.filter(r => r === 'know').length;
  const unknown = cardResults.filter(r => r === 'unknown').length;
  const skipped = cardResults.filter(r => r === null).length;
  const pct     = total > 0 ? Math.round(known / total * 100) : 0;

  document.getElementById('cardProgressFill').style.width = '100%';

  document.getElementById('resultInner').innerHTML = `
    <div class="result-card">
      <div class="result-title">カード学習 完了 🎉</div>
      <div class="result-score">${known}/${total}</div>
      <div class="result-pct">${pct}% 知ってた</div>
      <div class="card-stats">
        <span class="card-stat-know">○ 知ってた：${known}語</span>
        <span class="card-stat-unknown">✕ 知らなかった：${unknown}語</span>
        ${skipped > 0 ? `<span class="card-stat-skip">－ 未回答：${skipped}語</span>` : ''}
      </div>
      <div class="result-actions">
        ${unknown + skipped > 0
          ? `<button class="btn btn-primary btn-full" onclick="retryCards()">✕ の単語を再学習</button>`
          : ''}
        <button class="btn btn-secondary btn-full" onclick="startCardMode()">最初からやり直す</button>
        <button class="btn btn-ghost btn-full" onclick="backToSettings()">設定に戻る</button>
      </div>
    </div>`;

  document.getElementById('cardScreen').style.display   = 'none';
  document.getElementById('resultScreen').style.display = 'block';
  window.scrollTo(0, 0);
}

function retryCards() {
  const targets = testWords.filter((_, i) => cardResults[i] !== 'know');
  if (targets.length === 0) { alert('全て「知ってた」語です！'); return; }
  testWords = targets;
  startCardMode();
}

// ── Test Creation Log ─────────────────────────────────────
const LOG_KEY  = 'vocabTestLog_v1';
const NAME_KEY = 'vocabTestStudent_v1';

function getLogs()        { try { return JSON.parse(localStorage.getItem(LOG_KEY)||'[]'); } catch { return []; } }
function saveLogs(list)   { localStorage.setItem(LOG_KEY, JSON.stringify(list)); }
function getStudentName() { return localStorage.getItem(NAME_KEY)||''; }
function persistStudentName() { localStorage.setItem(NAME_KEY, document.getElementById('studentNameInput').value); }

function saveLog(entry) { const logs=getLogs(); logs.push(entry); saveLogs(logs); }

function openLogModal() {
  document.getElementById('studentNameInput').value = getStudentName();
  renderLogTable();
  document.getElementById('logModal').classList.add('open');
}
function closeLogModal() { document.getElementById('logModal').classList.remove('open'); }
document.getElementById('logModal').addEventListener('click', e => {
  if (e.target === document.getElementById('logModal')) closeLogModal();
});

function renderLogTable() {
  const logs = getLogs();
  const wrap = document.getElementById('logTableWrap');
  if (logs.length === 0) {
    wrap.innerHTML = '<div class="log-empty">まだテストのログがありません</div>';
    return;
  }
  const rows = logs.map((e, i) => {
    const dt   = new Date(e.timestamp).toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    const dir  = e.direction==='en2ja' ? '英→日' : '日→英';
    const mode = e.mode==='print' ? '印刷' : e.mode==='card' ? 'カード' : '画面';
    const sort = e.sortMode==='random' ? '乱'     : '順';
    return `<tr>
      <td>${dt}</td><td>${esc(e.dataset)}</td>
      <td>${e.rangeFrom}–${e.rangeTo}</td>
      <td>${e.count}問</td>
      <td style="white-space:nowrap;">${dir}/${mode}/${sort}</td>
      <td><button class="log-del-btn" onclick="deleteOneLog(${i})">✕</button></td>
    </tr>`;
  }).join('');
  wrap.innerHTML = `<table class="log-tbl">
    <thead><tr><th>日時</th><th>教材</th><th>範囲</th><th>問題数</th><th>設定</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function deleteOneLog(idx) {
  const logs = getLogs(); logs.splice(idx, 1); saveLogs(logs); renderLogTable();
}

function clearAllLogs() {
  if (!confirm('全てのログを削除しますか？')) return;
  saveLogs([]); renderLogTable();
}

function exportLogPDF() {
  const name  = getStudentName();
  const logs  = getLogs();
  const today = new Date().toLocaleDateString('ja-JP');
  const rows  = logs.map(e => {
    const dt   = new Date(e.timestamp).toLocaleString('ja-JP');
    const dir  = e.direction==='en2ja' ? '英語→日本語' : '日本語→英語';
    const mode = e.mode==='print' ? '印刷用' : e.mode==='card' ? 'カード学習' : '画面で回答';
    const sort = e.sortMode==='random' ? 'ランダム'      : '順番通り';
    return `<tr>
      <td>${dt}</td><td>${esc(e.dataset)}</td>
      <td>${e.rangeFrom}–${e.rangeTo}</td><td>${e.count}問</td>
      <td>${dir} / ${mode} / ${sort}</td>
    </tr>`;
  }).join('');
  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html lang="ja"><head>
    <meta charset="UTF-8"><title>テスト作成ログ</title>
    <style>
      body  { font-family:'Hiragino Kaku Gothic Pro','Noto Sans JP',sans-serif;
              padding:12mm 16mm; color:#1a1a1a; font-size:13px; }
      h1    { font-size:17px; border-bottom:2px solid #0075de;
              padding-bottom:8px; margin-bottom:6px; }
      .meta { font-size:11px; color:#777; margin-bottom:18px; }
      table { width:100%; border-collapse:collapse; }
      th    { background:#f2f2f2; padding:6px 8px; text-align:left;
              border:1px solid #d0d0d0; font-size:11px; }
      td    { padding:5px 8px; border:1px solid #d0d0d0; }
      tr:nth-child(even) td { background:#fafafa; }
      @media print { @page { margin:12mm; } }
    </style>
  </head><body>
    <h1>📋 テスト作成ログ</h1>
    <div class="meta">${name ? '生徒名：<strong>'+esc(name)+'</strong>&emsp;' : ''}出力日：${today}&emsp;全 ${logs.length} 件</div>
    ${logs.length > 0
      ? `<table><thead><tr><th>日時</th><th>教材</th><th>範囲</th><th>問題数</th><th>設定</th></tr></thead><tbody>${rows}</tbody></table>`
      : '<p style="color:#999;">ログはありません。</p>'
    }
  </body></html>`);
  win.document.close();
  win.focus();
  setTimeout(() => win.print(), 400);
}

initSpeech();
</script>
