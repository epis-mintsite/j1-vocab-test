<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>でる度単語テスト</title>
<!-- SheetJS: Excel/CSV パース用 -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: #f0f2f5; color: #333; }

/* ========== Settings ========== */
.settings {
  max-width: 580px; margin: 30px auto; background: #fff;
  border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.1); padding: 28px;
}
.settings h1 {
  text-align: center; font-size: 20px; margin-bottom: 20px;
  border-bottom: 3px solid #2563eb; padding-bottom: 12px;
}

/* ── Dataset selector ── */
.dataset-selector { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
.dataset-btn {
  position: relative; flex: 1; min-width: 120px; padding: 10px 8px 10px;
  border: 2px solid #e2e8f0; border-radius: 8px; background: #f8fafc;
  cursor: pointer; text-align: center; font-size: 13px; font-family: inherit;
  transition: all .15s;
}
.dataset-btn:hover  { border-color: #93c5fd; background: #eff6ff; }
.dataset-btn.active { border-color: #2563eb; background: #eff6ff; font-weight: bold; }
.dataset-btn.loading { opacity: .5; pointer-events: none; }
.dataset-btn.empty  { opacity: .45; }
.dataset-btn .ds-label { font-size: 13px; }
.dataset-btn .ds-count { font-size: 11px; color: #888; margin-top: 2px; }
/* 削除ボタン（カスタムのみ） */
.dataset-btn .ds-del {
  position: absolute; top: 3px; right: 5px; font-size: 13px; color: #cbd5e1;
  cursor: pointer; line-height: 1; padding: 2px;
}
.dataset-btn .ds-del:hover { color: #ef4444; }
.dataset-add {
  flex: 1; min-width: 120px; padding: 10px 8px; border: 2px dashed #cbd5e1;
  border-radius: 8px; background: #fff; cursor: pointer; text-align: center;
  font-size: 13px; color: #64748b; font-family: inherit; transition: all .15s;
  display: flex; align-items: center; justify-content: center; gap: 4px;
}
.dataset-add:hover { border-color: #2563eb; color: #2563eb; background: #eff6ff; }

.form-group { margin-bottom: 16px; }
.form-group > label { display: block; font-weight: bold; margin-bottom: 6px; font-size: 14px; }
.form-row { display: flex; gap: 10px; align-items: center; }
.form-row input[type=number] {
  width: 90px; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px;
  font-size: 15px; text-align: center;
}
.form-row span { font-size: 14px; color: #666; }
.radio-group { display: flex; gap: 16px; margin-top: 4px; flex-wrap: wrap; }
.radio-group label {
  font-weight: normal; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; gap: 4px;
}
.info-text { font-size: 12px; color: #888; margin-top: 6px; }

.btn {
  display: block; width: 100%; padding: 13px; border: none; border-radius: 8px;
  font-size: 15px; font-weight: bold; cursor: pointer; transition: background .15s;
  font-family: inherit;
}
.btn-primary   { background: #2563eb; color: #fff; }
.btn-primary:hover   { background: #1d4ed8; }
.btn-secondary { background: #e5e7eb; color: #333; margin-top: 8px; }
.btn-secondary:hover { background: #d1d5db; }
.btn-answer    { background: #10b981; color: #fff; margin-top: 8px; }
.btn-answer:hover    { background: #059669; }

/* ── Voice ── */
.voice-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
.btn-mic {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 11px; border: 2px solid #e2e8f0; border-radius: 8px; background: #f8fafc;
  cursor: pointer; font-size: 14px; font-weight: bold; font-family: inherit;
  transition: all .15s; color: #475569;
}
.btn-mic:hover { border-color: #93c5fd; background: #eff6ff; color: #2563eb; }
.btn-mic.listening { border-color: #ef4444; background: #fef2f2; color: #ef4444; animation: pulse 1s infinite; }
.btn-mic.unsupported { opacity: .4; cursor: not-allowed; }
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,.3); }
  50%      { box-shadow: 0 0 0 6px rgba(239,68,68,0); }
}
.voice-preview {
  display: none; background: #f0fdf4; border: 1px solid #86efac;
  border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; font-size: 13px;
}
.voice-preview .heard { color: #6b7280; font-size: 12px; margin-bottom: 6px; }
.voice-preview .heard span { font-style: italic; }
.voice-preview table { width: 100%; border-collapse: collapse; }
.voice-preview td { padding: 3px 6px; }
.voice-preview td:first-child { color: #555; width: 100px; }
.voice-preview td:last-child  { font-weight: bold; color: #166534; }
.voice-preview .voice-actions { display: flex; gap: 8px; margin-top: 10px; }
.voice-preview .voice-actions button {
  flex: 1; padding: 7px; border: none; border-radius: 6px; font-size: 13px;
  font-weight: bold; cursor: pointer; font-family: inherit;
}
.btn-apply { background: #22c55e; color: #fff; }
.btn-apply:hover { background: #16a34a; }
.btn-retry { background: #e5e7eb; color: #333; }
.btn-retry:hover { background: #d1d5db; }
.voice-hint { font-size: 11px; color: #94a3b8; text-align: center; margin-bottom: 12px; line-height: 1.6; }

/* ========== Upload Modal ========== */
.modal-backdrop {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
  z-index: 100; align-items: center; justify-content: center; padding: 16px;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: #fff; border-radius: 14px; width: 100%; max-width: 500px;
  box-shadow: 0 8px 40px rgba(0,0,0,.25); overflow: hidden;
}
.modal-header {
  background: #2563eb; color: #fff; padding: 16px 20px;
  display: flex; justify-content: space-between; align-items: center;
}
.modal-header h2 { font-size: 16px; }
.modal-close { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; line-height: 1; }
.modal-body { padding: 20px; }
.modal-footer { padding: 12px 20px; background: #f8fafc; display: flex; gap: 10px; justify-content: flex-end; }
.modal-footer button {
  padding: 9px 22px; border: none; border-radius: 7px; font-size: 14px;
  font-weight: bold; cursor: pointer; font-family: inherit;
}
.modal-footer .btn-confirm { background: #2563eb; color: #fff; }
.modal-footer .btn-confirm:hover { background: #1d4ed8; }
.modal-footer .btn-confirm:disabled { background: #93c5fd; cursor: not-allowed; }
.modal-footer .btn-cancel  { background: #e5e7eb; color: #333; }
.modal-footer .btn-cancel:hover { background: #d1d5db; }

.field-group { margin-bottom: 16px; }
.field-group label { display: block; font-weight: bold; font-size: 13px; margin-bottom: 6px; }
.field-group input[type=text] {
  width: 100%; padding: 9px 12px; border: 1px solid #cbd5e1; border-radius: 7px;
  font-size: 14px; font-family: inherit;
}
.field-group input[type=text]:focus { outline: none; border-color: #2563eb; }

/* Drop zone */
.drop-zone {
  border: 2px dashed #cbd5e1; border-radius: 10px; padding: 28px 16px;
  text-align: center; cursor: pointer; transition: all .15s; background: #f8fafc;
}
.drop-zone:hover, .drop-zone.drag-over { border-color: #2563eb; background: #eff6ff; }
.drop-zone .dz-icon { font-size: 36px; }
.drop-zone .dz-text { font-size: 14px; color: #475569; margin-top: 8px; }
.drop-zone .dz-sub  { font-size: 12px; color: #94a3b8; margin-top: 4px; }
.drop-zone input[type=file] { display: none; }
.drop-zone.has-file { border-color: #22c55e; background: #f0fdf4; }
.drop-zone.has-file .dz-icon::after { content: ' ✅'; }

.format-hint {
  background: #fef9c3; border-radius: 8px; padding: 10px 12px;
  font-size: 12px; color: #854d0e; margin-top: 10px; line-height: 1.6;
}
.format-hint code { background: #fef08a; padding: 1px 4px; border-radius: 3px; font-family: monospace; }

/* Preview table */
.preview-table-wrap { margin-top: 12px; max-height: 160px; overflow-y: auto; border-radius: 6px; border: 1px solid #e2e8f0; }
.preview-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.preview-table th { background: #f1f5f9; padding: 6px 10px; text-align: left; position: sticky; top: 0; }
.preview-table td { padding: 5px 10px; border-top: 1px solid #f1f5f9; }
.preview-table tr:hover td { background: #f8fafc; }

.parse-error { color: #ef4444; font-size: 13px; margin-top: 8px; }
.parse-ok    { color: #16a34a; font-size: 13px; margin-top: 8px; font-weight: bold; }

/* ========== Test Sheet ========== */
.test-sheet {
  max-width: 900px; margin: 0 auto; background: #fff; padding: 24px 32px; min-height: 100vh;
}
.test-header {
  border: 2px solid #333; padding: 8px 16px; margin-bottom: 4px;
  display: flex; justify-content: space-between; align-items: center;
}
.test-header h2 { font-size: 20px; }
.test-meta {
  display: flex; justify-content: space-between; margin-bottom: 14px;
  font-size: 13px; color: #555;
}
.score-box { font-weight: bold; font-size: 15px; }
.test-grid { display: grid; gap: 0; }
.test-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.test-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.test-item { padding: 6px 10px; border-bottom: 1px solid #eee; }
.test-item .word-num { font-size: 11px; color: #999; }
.test-item .word-en  { font-size: 17px; font-weight: 500; margin: 2px 0; }
.test-item .answer-line { border-bottom: 1px solid #999; height: 24px; margin-top: 2px; }
.test-item .answer-input {
  width: 100%; border: none; border-bottom: 1.5px solid #999;
  font-size: 14px; padding: 4px 0; outline: none; background: transparent; font-family: inherit;
}
.test-item .answer-input:focus { border-bottom-color: #2563eb; }
.test-item .answer-text { font-size: 14px; color: #2563eb; font-weight: 500; margin-top: 2px; }
.test-item .answer-correct { color: #10b981; }
.test-item .answer-wrong   { color: #ef4444; }
.action-bar {
  max-width: 900px; margin: 0 auto; padding: 14px 32px;
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  background: #fff; border-top: 1px solid #eee; position: sticky; bottom: 0;
}
.action-bar .btn { width: auto; padding: 10px 22px; font-size: 14px; }
.quiz-result {
  text-align: center; padding: 40px 20px; max-width: 560px; margin: 30px auto;
  background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.1);
}
.quiz-result h2    { font-size: 26px; margin-bottom: 14px; }
.quiz-result .score  { font-size: 60px; font-weight: bold; color: #2563eb; }
.quiz-result .detail { font-size: 15px; color: #666; margin: 10px 0; }

/* Print */
@media print {
  body { background: #fff; }
  .action-bar, .settings { display: none !important; }
  .test-sheet { padding: 8px; box-shadow: none; }
  .test-item .answer-input { display: none; }
  @page { margin: 10mm; }
}
@media (max-width: 640px) {
  .settings { margin: 8px; padding: 16px; }
  .test-sheet { padding: 10px; }
  .test-grid.cols-3 { grid-template-columns: 1fr 1fr; }
  .test-header h2 { font-size: 16px; }
}
</style>
</head>
<body>

<!-- ===== Settings Screen ===== -->
<div id="settingsScreen" class="settings">
  <h1 id="appTitle">でる度単語テスト</h1>

  <!-- ① データセット選択 -->
  <div class="form-group">
    <label>教材を選ぶ</label>
    <div class="dataset-selector" id="datasetSelector"></div>
    <p class="info-text" id="datasetInfo">読み込み中…</p>
  </div>

  <hr style="border:none;border-top:1px solid #e5e7eb;margin:16px 0;">

  <!-- ② 音声入力 -->
  <div class="voice-row">
    <button class="btn-mic" id="btnMic" onclick="toggleVoice()">
      <span class="mic-icon">🎤</span>
      <span id="micLabel">音声で設定する</span>
    </button>
  </div>
  <div class="voice-hint" id="voiceHint">例：「1番から100番、40問、ランダム、画面で」と話しかけてください</div>
  <div class="voice-preview" id="voicePreview"></div>

  <!-- 出題設定フォーム -->
  <div id="settingsForm">
    <div class="form-group">
      <label>出題範囲</label>
      <div class="form-row">
        <input type="number" id="rangeFrom" min="1" value="1">
        <span>〜</span>
        <input type="number" id="rangeTo" min="1" value="100">
      </div>
    </div>
    <div class="form-group">
      <label>出題数</label>
      <div class="radio-group">
        <label><input type="radio" name="countMode" value="all" checked onchange="toggleCountInput()"> 全て出題</label>
        <label><input type="radio" name="countMode" value="random" onchange="toggleCountInput()"> ランダム抽出</label>
      </div>
      <div class="form-row" style="margin-top:8px;">
        <input type="number" id="wordCount" min="1" value="40" disabled>
        <span>語</span>
      </div>
    </div>
    <div class="form-group">
      <label>出題順</label>
      <div class="radio-group">
        <label><input type="radio" name="sortMode" value="sequential" checked> 順番通り</label>
        <label><input type="radio" name="sortMode" value="random"> ランダム</label>
      </div>
    </div>
    <div class="form-group">
      <label>レイアウト</label>
      <div class="radio-group">
        <label><input type="radio" name="cols" value="2" checked> ２列</label>
        <label><input type="radio" name="cols" value="3"> ３列</label>
      </div>
    </div>
    <div class="form-group">
      <label>出題方向</label>
      <div class="radio-group">
        <label><input type="radio" name="direction" value="en2ja" checked> 英語→日本語</label>
        <label><input type="radio" name="direction" value="ja2en"> 日本語→英語</label>
      </div>
    </div>
    <div class="form-group">
      <label>モード</label>
      <div class="radio-group">
        <label><input type="radio" name="mode" value="print" checked> 印刷用テスト</label>
        <label><input type="radio" name="mode" value="interactive"> 画面上で回答</label>
      </div>
    </div>
    <p class="info-text" id="infoText"></p>
    <button class="btn btn-primary" onclick="generateTest()">テスト作成</button>
    <a href="guide.html" target="_blank"
       style="display:block;text-align:center;margin-top:12px;font-size:13px;color:#2563eb;text-decoration:none;">
      操作手順書を見る
    </a>
  </div>
</div>

<!-- ===== Test / Result Screens ===== -->
<div id="testScreen" style="display:none;">
  <div class="test-sheet" id="testSheet"></div>
  <div class="action-bar"  id="actionBar"></div>
</div>
<div id="resultScreen" style="display:none;"></div>

<!-- ===== Upload Modal ===== -->
<div class="modal-backdrop" id="uploadModal">
  <div class="modal">
    <div class="modal-header">
      <h2>📚 単語帳を追加する</h2>
      <button class="modal-close" onclick="closeUploadModal()">×</button>
    </div>
    <div class="modal-body">

      <div class="field-group">
        <label>教材名（例：システム英単語、TOEIC金フレ）</label>
        <input type="text" id="dsName" placeholder="教材名を入力" oninput="validateModal()">
      </div>

      <div class="field-group">
        <label>単語ファイルを選択</label>
        <div class="drop-zone" id="dropZone"
             onclick="document.getElementById('fileInput').click()"
             ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
          <div class="dz-icon">📄</div>
          <div class="dz-text">クリックまたはファイルをここにドロップ</div>
          <div class="dz-sub">CSV / Excel (.xlsx .xls) に対応</div>
          <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" onchange="onFileSelect(event)">
        </div>

        <div class="format-hint">
          <strong>ファイル形式：</strong>1行目はヘッダー行（自動スキップ）<br>
          <code>A列</code> = 問題文（英語など）　<code>B列</code> = 解答（日本語など）<br>
          例：<code>last, 続く・継続する</code>
        </div>

        <div id="parseMsg"></div>
        <div class="preview-table-wrap" id="previewWrap" style="display:none;"></div>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeUploadModal()">キャンセル</button>
      <button class="btn-confirm" id="btnConfirm" disabled onclick="confirmUpload()">追加する</button>
    </div>
  </div>
</div>


<!-- ================================================================
     JavaScript
================================================================ -->
<script>
// ───────────────────────────────────────────────────────
// 定数：組み込みデータセット定義
// ───────────────────────────────────────────────────────
const BUILTIN_DATASETS = [
  { id: 'j1', label: '英検 準１級', file: 'words_j1.js' },
];
const STORAGE_KEY = 'customDatasets_v1';

// ───────────────────────────────────────────────────────
// State
// ───────────────────────────────────────────────────────
let currentDataset = null;
let loadedCache    = {};    // id → {id, label, total, words[]}
let parsedWords    = [];    // アップロードモーダルで一時保持

// ───────────────────────────────────────────────────────
// LocalStorage: カスタムデータセット管理
// ───────────────────────────────────────────────────────
function loadCustomDatasetsFromStorage() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  } catch { return []; }
}

function saveCustomDatasetsToStorage(list) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

function getAllDatasets() {
  const customs = loadCustomDatasetsFromStorage();
  return [
    ...BUILTIN_DATASETS.map(d => ({ ...d, custom: false })),
    ...customs.map(d => ({ ...d, custom: true })),
  ];
}

// ───────────────────────────────────────────────────────
// データセット UI
// ───────────────────────────────────────────────────────
function buildDatasetSelector() {
  const sel  = document.getElementById('datasetSelector');
  sel.innerHTML = '';
  const all  = getAllDatasets();

  all.forEach(ds => {
    const cached = loadedCache[ds.id];
    const countText = cached
      ? (cached.total > 0 ? `${cached.total}語` : '（準備中）')
      : '読み込み中…';

    const btn = document.createElement('button');
    btn.className = 'dataset-btn'
      + (cached && cached.total === 0 ? ' empty' : '')
      + (currentDataset && currentDataset.id === ds.id ? ' active' : '');
    btn.id = 'dsbtn-' + ds.id;
    btn.onclick = () => selectDataset(ds.id);
    btn.innerHTML = `<div class="ds-label">${ds.label}</div><div class="ds-count">${countText}</div>`;

    // カスタムは削除ボタン付き
    if (ds.custom) {
      const del = document.createElement('span');
      del.className = 'ds-del';
      del.title = '削除';
      del.textContent = '✕';
      del.onclick = e => { e.stopPropagation(); deleteCustomDataset(ds.id); };
      btn.appendChild(del);
    }
    sel.appendChild(btn);
  });

  // 追加ボタン
  const addBtn = document.createElement('button');
  addBtn.className = 'dataset-add';
  addBtn.innerHTML = '＋ 教材を追加';
  addBtn.onclick = openUploadModal;
  sel.appendChild(addBtn);
}

function deleteCustomDataset(id) {
  if (!confirm('この教材を削除してよいですか？')) return;
  const list = loadCustomDatasetsFromStorage().filter(d => d.id !== id);
  saveCustomDatasetsToStorage(list);
  delete loadedCache[id];
  if (currentDataset && currentDataset.id === id) currentDataset = null;
  buildDatasetSelector();
  if (!currentDataset) selectDataset('j1');
}

// ───────────────────────────────────────────────────────
// データセット選択・ロード
// ───────────────────────────────────────────────────────
function selectDataset(id) {
  if (loadedCache[id]) { applyDataset(loadedCache[id]); return; }

  const all = getAllDatasets();
  const ds  = all.find(d => d.id === id);
  if (!ds) return;

  // カスタムデータはストレージから直接復元
  if (ds.custom) {
    const stored = loadCustomDatasetsFromStorage().find(d => d.id === id);
    if (stored) { loadedCache[id] = stored; applyDataset(stored); return; }
  }

  // 組み込みは動的 script ロード
  const btnEl = document.getElementById('dsbtn-' + id);
  if (btnEl) btnEl.classList.add('loading');

  const script = document.createElement('script');
  script.src = ds.file + '?v=1';
  script.onload = () => {
    loadedCache[id] = window.DATASET;
    delete window.DATASET;
    buildDatasetSelector();
    applyDataset(loadedCache[id]);
  };
  script.onerror = () => {
    if (btnEl) btnEl.classList.remove('loading');
    console.warn('dataset load failed:', ds.file);
    // ダミーで空データを登録しておく（再クリックで再試行させない）
    loadedCache[id] = { id, label: ds.label, total: 0, words: [] };
    buildDatasetSelector();
    applyDataset(loadedCache[id]);
  };
  document.head.appendChild(script);
}

function applyDataset(ds) {
  currentDataset = ds;
  document.getElementById('appTitle').textContent = `でる度単語テスト  ${ds.label}`;
  const maxVal = ds.total || 1;
  document.getElementById('rangeTo').max   = maxVal;
  document.getElementById('rangeFrom').max = maxVal;
  if (parseInt(document.getElementById('rangeTo').value) > maxVal)
    document.getElementById('rangeTo').value = Math.min(100, maxVal);
  document.getElementById('datasetInfo').textContent =
    ds.total > 0 ? `${ds.total}語が利用可能です。` : 'データが未登録です（準備中）。';

  const locked = ds.total === 0;
  document.getElementById('settingsForm').style.opacity       = locked ? '.4' : '';
  document.getElementById('settingsForm').style.pointerEvents = locked ? 'none' : '';

  buildDatasetSelector();
  updateInfo();
}

window.addEventListener('DOMContentLoaded', () => {
  buildDatasetSelector();
  selectDataset('j1');
});


// ───────────────────────────────────────────────────────
// Upload Modal
// ───────────────────────────────────────────────────────
function openUploadModal() {
  parsedWords = [];
  document.getElementById('dsName').value   = '';
  document.getElementById('parseMsg').innerHTML = '';
  document.getElementById('previewWrap').style.display = 'none';
  document.getElementById('btnConfirm').disabled = true;
  const dz = document.getElementById('dropZone');
  dz.classList.remove('has-file');
  dz.querySelector('.dz-text').textContent = 'クリックまたはファイルをここにドロップ';
  dz.querySelector('.dz-sub').textContent  = 'CSV / Excel (.xlsx .xls) に対応';
  document.getElementById('fileInput').value = '';
  document.getElementById('uploadModal').classList.add('open');
}

function closeUploadModal() {
  document.getElementById('uploadModal').classList.remove('open');
}

document.getElementById('uploadModal').addEventListener('click', e => {
  if (e.target === document.getElementById('uploadModal')) closeUploadModal();
});

function onDragOver(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.add('drag-over');
}
function onDragLeave(e) {
  document.getElementById('dropZone').classList.remove('drag-over');
}
function onDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
}
function onFileSelect(e) {
  const file = e.target.files[0];
  if (file) processFile(file);
}

function processFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  const dz  = document.getElementById('dropZone');
  dz.querySelector('.dz-text').textContent = `📂 ${file.name}`;
  dz.querySelector('.dz-sub').textContent  = `${(file.size / 1024).toFixed(1)} KB`;
  document.getElementById('parseMsg').innerHTML = '<span style="color:#94a3b8">解析中…</span>';
  document.getElementById('previewWrap').style.display = 'none';

  const reader = new FileReader();

  if (ext === 'csv') {
    reader.onload = e => parseCSV(e.target.result);
    reader.readAsText(file, 'UTF-8');
  } else if (ext === 'xlsx' || ext === 'xls') {
    reader.onload = e => parseExcel(e.target.result);
    reader.readAsArrayBuffer(file);
  } else {
    showParseError('対応していないファイル形式です（CSV または Excel を選んでください）。');
  }
}

function parseCSV(text) {
  // BOM 除去
  const clean = text.replace(/^﻿/, '');
  const lines = clean.split(/\r?\n/).filter(l => l.trim());
  const rows  = lines.map(l => {
    // カンマ区切り（ダブルクォート対応）
    const m = l.match(/("(?:[^"]|"")*"|[^,]*)/g);
    return m ? m.map(v => v.replace(/^"|"$/g, '').replace(/""/g, '"').trim()) : [];
  });
  applyParsedRows(rows);
}

function parseExcel(buffer) {
  try {
    const wb   = XLSX.read(buffer, { type: 'array' });
    const ws   = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    applyParsedRows(rows);
  } catch(e) {
    showParseError('Excelファイルの読み込みに失敗しました: ' + e.message);
  }
}

function applyParsedRows(rows) {
  // 1行目: ヘッダー判定（A列が数字なら単語行と判断、そうでなければスキップ）
  let startIdx = 0;
  if (rows.length > 0) {
    const firstA = String(rows[0][0] || '').trim();
    // 1行目が数字またはヘッダーっぽい（日本語/英語ラベル）なら skip
    if (!/^\d+$/.test(firstA) && rows.length > 1) startIdx = 1;
  }

  const words = [];
  for (let i = startIdx; i < rows.length; i++) {
    const a = String(rows[i][0] || '').trim();
    const b = String(rows[i][1] || '').trim();
    if (!a || !b) continue;
    words.push({ id: words.length + 1, en: a, ja: b });
  }

  if (words.length < 2) {
    showParseError(`有効な単語行が見つかりませんでした（${rows.length}行を解析、有効行: ${words.length}）。<br>A列に問題文、B列に解答が入っているか確認してください。`);
    return;
  }

  parsedWords = words;
  showParseOK(words);
  validateModal();
}

function showParseError(msg) {
  document.getElementById('parseMsg').innerHTML = `<div class="parse-error">⚠ ${msg}</div>`;
  document.getElementById('previewWrap').style.display = 'none';
  document.getElementById('dropZone').classList.remove('has-file');
  parsedWords = [];
  validateModal();
}

function showParseOK(words) {
  document.getElementById('dropZone').classList.add('has-file');
  document.getElementById('parseMsg').innerHTML =
    `<div class="parse-ok">✔ ${words.length}語を読み込みました</div>`;

  // プレビュー（先頭5語）
  const preview = words.slice(0, 5);
  let html = `<table class="preview-table">
    <tr><th>#</th><th>問題文</th><th>解答</th></tr>
    ${preview.map(w => `<tr><td>${w.id}</td><td>${esc(w.en)}</td><td>${esc(w.ja)}</td></tr>`).join('')}
    ${words.length > 5 ? `<tr><td colspan="3" style="text-align:center;color:#94a3b8;font-size:12px;">…他 ${words.length - 5} 語</td></tr>` : ''}
  </table>`;
  document.getElementById('previewWrap').innerHTML = html;
  document.getElementById('previewWrap').style.display = 'block';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function validateModal() {
  const name = document.getElementById('dsName').value.trim();
  document.getElementById('btnConfirm').disabled = !(name && parsedWords.length > 0);
}

function confirmUpload() {
  const name = document.getElementById('dsName').value.trim();
  const id   = 'custom_' + Date.now();

  const newDs = {
    id,
    label:  name,
    total:  parsedWords.length,
    words:  parsedWords,
    custom: true,
  };

  // storage に保存（wordsデータごと）
  const list = loadCustomDatasetsFromStorage();
  list.push(newDs);
  saveCustomDatasetsToStorage(list);

  loadedCache[id] = newDs;
  closeUploadModal();
  buildDatasetSelector();
  selectDataset(id);
}


// ───────────────────────────────────────────────────────
// ② 音声入力（Web Speech API）
// ───────────────────────────────────────────────────────
let recognition = null;
let isListening = false;

function initSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('btnMic').classList.add('unsupported');
    document.getElementById('micLabel').textContent = '音声入力は非対応です';
    document.getElementById('voiceHint').textContent = '（Chrome/Edge での利用を推奨します）';
    return;
  }
  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.interimResults = false;
  recognition.maxAlternatives = 3;
  recognition.onresult = e => {
    const best = e.results[0][0].transcript;
    stopListening();
    showVoicePreview(best, parseVoiceCommand(best));
  };
  recognition.onerror = e => {
    stopListening();
    if (e.error === 'no-speech')    showVoiceError('音声が認識されませんでした。');
    if (e.error === 'not-allowed')  showVoiceError('マイクのアクセスが拒否されています。');
  };
  recognition.onend = () => stopListening();
}

function toggleVoice() {
  if (document.getElementById('btnMic').classList.contains('unsupported')) return;
  if (!recognition) initSpeech();
  isListening ? stopListening() : startListening();
}
function startListening() {
  const btn = document.getElementById('btnMic');
  btn.classList.add('listening');
  document.getElementById('micLabel').textContent = '聞いています… (もう一度押すと停止)';
  document.getElementById('voicePreview').style.display = 'none';
  isListening = true;
  try { recognition.start(); } catch(_){}
}
function stopListening() {
  isListening = false;
  document.getElementById('btnMic').classList.remove('listening');
  document.getElementById('micLabel').textContent = '音声で設定する';
  try { recognition.stop(); } catch(_){}
}

function parseVoiceCommand(text) {
  const r = {};
  const rangeM = text.match(/(\d+)\s*(?:番|問目|語目)?(?:から|〜|～)\s*(\d+)\s*(?:番|問目|語目)?/);
  if (rangeM) { r.rangeFrom = +rangeM[1]; r.rangeTo = +rangeM[2]; }
  const countM = text.match(/(\d+)\s*(?:問|語|個)/);
  if (countM) { r.wordCount = +countM[1]; r.countMode = 'random'; }
  if (/全[部て]|すべて|全問|全単語/.test(text)) { r.countMode = 'all'; delete r.wordCount; }
  if (/ランダム|バラバラ|混ぜ|シャッフル/.test(text)) r.sortMode = 'random';
  if (/順番通り|順番に|そのまま/.test(text)) r.sortMode = 'sequential';
  const colsM = text.match(/([2３3二三])\s*列/);
  if (colsM) r.cols = /[3３三]/.test(colsM[1]) ? 3 : 2;
  if (/日本語.*英語|和訳.*英語|日英/.test(text)) r.direction = 'ja2en';
  if (/英語.*日本語|英和|英訳/.test(text))       r.direction = 'en2ja';
  if (/印刷|プリント|紙/.test(text))             r.mode = 'print';
  if (/画面|入力|インタラクティブ/.test(text))    r.mode = 'interactive';
  if (/作成|始め|スタート|開始|テスト/.test(text)) r.trigger = true;
  return r;
}

function showVoicePreview(heard, p) {
  const div = document.getElementById('voicePreview');
  if (Object.keys(p).filter(k => k !== 'trigger').length === 0) {
    div.style.display = 'block';
    div.innerHTML = `<div class="heard">認識：<span>「${heard}」</span></div>
      <div style="color:#ef4444;font-size:13px;">設定を読み取れませんでした。もう一度お試しください。</div>
      <div class="voice-actions"><button class="btn-retry" onclick="toggleVoice()">🎤 もう一度</button></div>`;
    return;
  }
  const lines = buildPreviewLines(p);
  div.style.display = 'block';
  div.innerHTML = `<div class="heard">認識：<span>「${heard}」</span></div>
    <table>${lines}</table>
    <div class="voice-actions">
      <button class="btn-apply" onclick="applyVoiceSettings()">この設定でテスト作成</button>
      <button class="btn-retry" onclick="toggleVoice()">🎤 やり直す</button>
    </div>`;
  div.dataset.parsed = JSON.stringify(p);
}

function buildPreviewLines(p) {
  let rows = '';
  const from = p.rangeFrom || +document.getElementById('rangeFrom').value;
  const to   = p.rangeTo   || +document.getElementById('rangeTo').value;
  if (p.rangeFrom || p.rangeTo) rows += `<tr><td>出題範囲</td><td>${from} 〜 ${to}</td></tr>`;
  if (p.countMode === 'all')  rows += `<tr><td>出題数</td><td>全て（${Math.max(0,to-from+1)}語）</td></tr>`;
  else if (p.wordCount)       rows += `<tr><td>出題数</td><td>ランダム ${p.wordCount}語</td></tr>`;
  if (p.sortMode)    rows += `<tr><td>出題順</td><td>${p.sortMode==='random'?'ランダム':'順番通り'}</td></tr>`;
  if (p.cols)        rows += `<tr><td>レイアウト</td><td>${p.cols}列</td></tr>`;
  if (p.direction)   rows += `<tr><td>出題方向</td><td>${p.direction==='en2ja'?'英語→日本語':'日本語→英語'}</td></tr>`;
  if (p.mode)        rows += `<tr><td>モード</td><td>${p.mode==='print'?'印刷用テスト':'画面上で回答'}</td></tr>`;
  return rows;
}

function applyVoiceSettings() {
  const p = JSON.parse(document.getElementById('voicePreview').dataset.parsed || '{}');
  if (p.rangeFrom) document.getElementById('rangeFrom').value = p.rangeFrom;
  if (p.rangeTo)   document.getElementById('rangeTo').value   = p.rangeTo;
  if (p.countMode) { document.querySelector(`input[name=countMode][value=${p.countMode}]`).checked = true; toggleCountInput(); }
  if (p.wordCount) document.getElementById('wordCount').value = p.wordCount;
  if (p.sortMode)  document.querySelector(`input[name=sortMode][value=${p.sortMode}]`).checked = true;
  if (p.cols)      document.querySelector(`input[name=cols][value=${p.cols}]`).checked = true;
  if (p.direction) document.querySelector(`input[name=direction][value=${p.direction}]`).checked = true;
  if (p.mode)      document.querySelector(`input[name=mode][value=${p.mode}]`).checked = true;
  document.getElementById('voicePreview').style.display = 'none';
  updateInfo();
  generateTest();
}

function showVoiceError(msg) {
  const div = document.getElementById('voicePreview');
  div.style.display = 'block';
  div.innerHTML = `<div style="color:#ef4444;font-size:13px;">${msg}</div>`;
}


// ───────────────────────────────────────────────────────
// テスト生成
// ───────────────────────────────────────────────────────
let testWords = [], isInteractive = false, direction = 'en2ja';

document.querySelectorAll('#settingsForm input').forEach(el => {
  el.addEventListener('change', updateInfo);
  el.addEventListener('input',  updateInfo);
});

function toggleCountInput() {
  document.getElementById('wordCount').disabled =
    document.querySelector('input[name=countMode]:checked').value === 'all';
  updateInfo();
}

function updateInfo() {
  if (!currentDataset) return;
  const from  = +document.getElementById('rangeFrom').value || 1;
  const to    = +document.getElementById('rangeTo').value   || 1;
  const mode  = document.querySelector('input[name=countMode]:checked').value;
  const count = +document.getElementById('wordCount').value || 0;
  const total = Math.max(0, to - from + 1);
  const n     = mode === 'all' ? total : Math.min(count, total);
  document.getElementById('infoText').textContent = `現在の設定で ${n} 語出題されます。`;
}

function generateTest() {
  if (!currentDataset || currentDataset.total === 0) { alert('教材データを選択してください。'); return; }
  const from      = +document.getElementById('rangeFrom').value;
  const to        = +document.getElementById('rangeTo').value;
  const countMode = document.querySelector('input[name=countMode]:checked').value;
  const sortMode  = document.querySelector('input[name=sortMode]:checked').value;
  const cols      = +document.querySelector('input[name=cols]:checked').value;
  direction       = document.querySelector('input[name=direction]:checked').value;
  isInteractive   = document.querySelector('input[name=mode]:checked').value === 'interactive';

  if (from < 1 || to > currentDataset.total || from > to) {
    alert(`出題範囲を正しく入力してください（1〜${currentDataset.total}）`); return;
  }
  let pool = currentDataset.words.filter(w => w.id >= from && w.id <= to);
  let n;
  if (countMode === 'all') { n = pool.length; }
  else {
    n = +document.getElementById('wordCount').value;
    if (!n || n < 1) { alert('問題数を入力してください'); return; }
    n = Math.min(n, pool.length);
    shuffle(pool); pool = pool.slice(0, n);
  }
  if (sortMode === 'random') shuffle(pool);
  else pool.sort((a, b) => a.id - b.id);

  testWords = pool;
  renderTest(cols, from, to);
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
}

function renderTest(cols, from, to) {
  const today = new Date().toLocaleDateString('ja-JP');
  const label = currentDataset?.label || '';
  let html = `
    <div class="test-header">
      <h2>単語テスト　${label}</h2>
      <span class="score-box">&nbsp;&nbsp;&nbsp;&nbsp;/${testWords.length}</span>
    </div>
    <div class="test-meta">
      <span>Date: ${today}</span>
      <span>出題範囲 ${from} 〜 ${to}</span>
    </div>
    <div class="test-grid cols-${cols}">`;
  testWords.forEach((w, i) => {
    const q = direction === 'en2ja' ? w.en : w.ja;
    html += `<div class="test-item">
      <span class="word-num">${w.id})</span>
      <div class="word-en">${esc(q)}</div>
      ${isInteractive
        ? `<input class="answer-input" data-idx="${i}" autocomplete="off" spellcheck="false">`
        : `<div class="answer-line"></div>`}
    </div>`;
  });
  html += '</div>';
  document.getElementById('testSheet').innerHTML = html;

  let btns = '<button class="btn btn-secondary" onclick="backToSettings()">設定に戻る</button>';
  if (isInteractive) btns += '<button class="btn btn-primary" onclick="checkAnswers()">採点する</button>';
  else { btns += '<button class="btn btn-primary" onclick="window.print()">印刷</button>';
         btns += '<button class="btn btn-answer"  onclick="showAnswers()">解答を表示</button>'; }
  document.getElementById('actionBar').innerHTML = btns;

  document.getElementById('settingsScreen').style.display = 'none';
  document.getElementById('testScreen').style.display     = 'block';
  document.getElementById('resultScreen').style.display   = 'none';
  window.scrollTo(0, 0);
}

function showAnswers() {
  document.querySelectorAll('.test-item').forEach((item, i) => {
    const w = testWords[i];
    item.querySelector('.answer-line')?.remove();
    if (!item.querySelector('.answer-text')) {
      const d = document.createElement('div');
      d.className = 'answer-text';
      d.textContent = direction === 'en2ja' ? w.ja : w.en;
      item.appendChild(d);
    }
  });
}


// ───────────────────────────────────────────────────────
// 採点ロジック（案A+Bハイブリッド）
// ───────────────────────────────────────────────────────
function normalize(s) {
  return s
    .replace(/[\s　、，,。．.…～〜・「」『』（）()＝=：:；;！!？?]/g, '')
    .replace(/^(を|に|と|が|で|は|へ|の|も)+/g, '')
    .replace(/(を|に|と|が|で|は|へ|の|も|から|まで|より|など|ば|て|た|だ)+$/g, '')
    .replace(/(を|に|と|が|で|は|へ|の|も|から|まで|より|など|ば)/g, '')
    .replace(/していく|してくる|しておく|している/g, 'する')
    .replace(/させる|される|された|させた/g, 'する')
    .replace(/った|んだ|いた|した/g, 'る')
    .replace(/ない$/, '').replace(/こと$|もの$|ところ$/, '');
}
function extractCoreWords(s) {
  const m = s.match(/[一-龯㐀-䶿]+|[゠-ヿ]+/g);
  return m ? m.filter(c => c.length >= 2) : [];
}
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, () => Array(n+1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function similarity(a, b) {
  if (!a||!b) return 0;
  return 1 - levenshtein(a,b) / Math.max(a.length, b.length);
}
function isAnswerCorrect(userAns, expected, dir, wordObj) {
  const ans = userAns.trim();
  if (!ans) return false;
  if (dir === 'ja2en') return ans.toLowerCase() === expected.toLowerCase();
  const nA = normalize(ans), nE = normalize(expected);
  if (nA === nE) return true;
  const parts = expected.split(/[、，,／/]/).map(p=>p.trim()).filter(Boolean);
  if (parts.some(p => normalize(p) === nA)) return true;
  if (wordObj?.alt?.some(a => normalize(a) === nA)) return true;
  const aC = extractCoreWords(ans), eC = extractCoreWords(expected);
  if (eC.length>0 && aC.length>0) {
    const matched = eC.filter(ec => aC.some(ac => ac===ec||ac.includes(ec)||ec.includes(ac))).length;
    if (matched >= Math.ceil(eC.length/2) && matched>=1) return true;
  }
  if (parts.some(p => similarity(normalize(p), nA) >= 0.6)) return true;
  if (wordObj?.alt?.some(a => similarity(normalize(a), nA) >= 0.6)) return true;
  return false;
}

function checkAnswers() {
  let correct = 0;
  document.querySelectorAll('.answer-input').forEach((input, i) => {
    const w = testWords[i];
    const expected = direction==='en2ja' ? w.ja : w.en;
    const userAns  = input.value.trim();
    const div = document.createElement('div');
    div.className = 'answer-text';
    if (!userAns) {
      div.classList.add('answer-wrong'); div.textContent = `→ ${expected}`;
    } else if (isAnswerCorrect(userAns, expected, direction, w)) {
      div.classList.add('answer-correct'); div.textContent = '○ '+expected; correct++;
      input.style.borderBottomColor = '#10b981';
    } else {
      div.classList.add('answer-wrong'); div.textContent = `✕ → ${expected}`;
      input.style.borderBottomColor = '#ef4444';
    }
    input.disabled = true;
    input.parentElement.appendChild(div);
  });
  const pct = Math.round(correct/testWords.length*100);
  document.getElementById('resultScreen').innerHTML = `
    <div class="quiz-result">
      <h2>採点結果</h2>
      <div class="score">${correct}/${testWords.length}</div>
      <div class="detail">${pct}% 正解</div>
      <button class="btn btn-secondary" onclick="backToSettings()" style="max-width:300px;margin:16px auto 0;">設定に戻る</button>
      <button class="btn btn-primary"   onclick="retryWrong()"     style="max-width:300px;margin:10px auto 0;">間違えた問題を再テスト</button>
    </div>`;
  document.getElementById('resultScreen').style.display = 'block';
  document.getElementById('resultScreen').scrollIntoView({behavior:'smooth'});
  document.querySelector('.score-box').textContent = `${correct}/${testWords.length}`;
}

function retryWrong() {
  const wrong = [];
  document.querySelectorAll('.answer-input').forEach((input, i) => {
    const w = testWords[i];
    const expected = direction==='en2ja' ? w.ja : w.en;
    if (!isAnswerCorrect(input.value.trim(), expected, direction, w)) wrong.push(w);
  });
  if (wrong.length===0) { alert('全問正解です！'); return; }
  testWords = wrong; isInteractive = true;
  const cols = document.querySelector('.test-grid').classList.contains('cols-3') ? 3 : 2;
  renderTest(cols, Math.min(...wrong.map(w=>w.id)), Math.max(...wrong.map(w=>w.id)));
}

function backToSettings() {
  document.getElementById('settingsScreen').style.display = 'block';
  document.getElementById('testScreen').style.display     = 'none';
  document.getElementById('resultScreen').style.display   = 'none';
  window.scrollTo(0, 0);
}

initSpeech();
