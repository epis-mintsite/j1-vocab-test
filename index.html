<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>でる度単語テスト</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: #f0f2f5; color: #333; }

/* ========== Settings ========== */
.settings {
  max-width: 560px; margin: 30px auto; background: #fff;
  border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.1); padding: 28px;
}
.settings h1 {
  text-align: center; font-size: 20px; margin-bottom: 20px;
  border-bottom: 3px solid #2563eb; padding-bottom: 12px;
}

/* Dataset selector */
.dataset-selector {
  display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
}
.dataset-btn {
  flex: 1; min-width: 120px; padding: 10px 8px; border: 2px solid #e2e8f0;
  border-radius: 8px; background: #f8fafc; cursor: pointer; text-align: center;
  font-size: 13px; font-family: inherit; transition: all .15s;
}
.dataset-btn:hover { border-color: #93c5fd; background: #eff6ff; }
.dataset-btn.active { border-color: #2563eb; background: #eff6ff; font-weight: bold; }
.dataset-btn .ds-label { font-size: 13px; }
.dataset-btn .ds-count { font-size: 11px; color: #888; margin-top: 2px; }
.dataset-btn.loading { opacity: .5; pointer-events: none; }
.dataset-btn.empty { opacity: .4; }
.dataset-add {
  flex: 1; min-width: 120px; padding: 10px 8px; border: 2px dashed #cbd5e1;
  border-radius: 8px; background: #fff; cursor: pointer; text-align: center;
  font-size: 12px; color: #94a3b8; font-family: inherit; transition: all .15s;
}
.dataset-add:hover { border-color: #93c5fd; color: #2563eb; }

.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-weight: bold; margin-bottom: 6px; font-size: 14px; }
.form-row { display: flex; gap: 10px; align-items: center; }
.form-row input[type=number] {
  width: 90px; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px;
  font-size: 15px; text-align: center;
}
.form-row span { font-size: 14px; color: #666; }
.radio-group { display: flex; gap: 16px; margin-top: 4px; flex-wrap: wrap; }
.radio-group label {
  font-weight: normal; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; gap: 4px;
}
.info-text { font-size: 12px; color: #888; margin-top: 6px; }

.btn {
  display: block; width: 100%; padding: 13px; border: none; border-radius: 8px;
  font-size: 15px; font-weight: bold; cursor: pointer; transition: background .15s;
  font-family: inherit;
}
.btn-primary   { background: #2563eb; color: #fff; }
.btn-primary:hover   { background: #1d4ed8; }
.btn-secondary { background: #e5e7eb; color: #333; margin-top: 8px; }
.btn-secondary:hover { background: #d1d5db; }
.btn-answer    { background: #10b981; color: #fff; margin-top: 8px; }
.btn-answer:hover    { background: #059669; }

/* ========== Voice ========== */
.voice-row {
  display: flex; gap: 10px; align-items: center; margin-bottom: 16px;
}
.btn-mic {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 11px; border: 2px solid #e2e8f0; border-radius: 8px;
  background: #f8fafc; cursor: pointer; font-size: 14px; font-weight: bold;
  font-family: inherit; transition: all .15s; color: #475569;
}
.btn-mic:hover { border-color: #93c5fd; background: #eff6ff; color: #2563eb; }
.btn-mic.listening {
  border-color: #ef4444; background: #fef2f2; color: #ef4444;
  animation: pulse 1s infinite;
}
.btn-mic.unsupported { opacity: .4; cursor: not-allowed; }
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,.3); }
  50%      { box-shadow: 0 0 0 6px rgba(239,68,68,0); }
}
.mic-icon { font-size: 18px; }

.voice-preview {
  display: none; background: #f0fdf4; border: 1px solid #86efac;
  border-radius: 8px; padding: 12px 14px; margin-bottom: 14px; font-size: 13px;
}
.voice-preview .heard { color: #6b7280; font-size: 12px; margin-bottom: 6px; }
.voice-preview .heard span { font-style: italic; }
.voice-preview table { width: 100%; border-collapse: collapse; }
.voice-preview td { padding: 3px 6px; }
.voice-preview td:first-child { color: #555; width: 100px; }
.voice-preview td:last-child { font-weight: bold; color: #166534; }
.voice-preview .voice-actions { display: flex; gap: 8px; margin-top: 10px; }
.voice-preview .voice-actions button {
  flex: 1; padding: 7px; border: none; border-radius: 6px; font-size: 13px;
  font-weight: bold; cursor: pointer; font-family: inherit;
}
.voice-preview .btn-apply  { background: #22c55e; color: #fff; }
.voice-preview .btn-apply:hover  { background: #16a34a; }
.voice-preview .btn-retry  { background: #e5e7eb; color: #333; }
.voice-preview .btn-retry:hover  { background: #d1d5db; }

.voice-hint {
  font-size: 11px; color: #94a3b8; text-align: center;
  margin-bottom: 14px; line-height: 1.6;
}

/* ========== Test Sheet ========== */
.test-sheet {
  max-width: 900px; margin: 0 auto; background: #fff; padding: 24px 32px; min-height: 100vh;
}
.test-header {
  border: 2px solid #333; padding: 8px 16px; margin-bottom: 4px;
  display: flex; justify-content: space-between; align-items: center;
}
.test-header h2 { font-size: 20px; }
.test-meta {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px; font-size: 13px; color: #555;
}
.score-box { font-weight: bold; font-size: 15px; }
.test-grid { display: grid; gap: 0; }
.test-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.test-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.test-item { padding: 6px 10px; border-bottom: 1px solid #eee; }
.test-item .word-num  { font-size: 11px; color: #999; }
.test-item .word-en   { font-size: 17px; font-weight: 500; margin: 2px 0; }
.test-item .answer-line { border-bottom: 1px solid #999; height: 24px; margin-top: 2px; }
.test-item .answer-input {
  width: 100%; border: none; border-bottom: 1.5px solid #999;
  font-size: 14px; padding: 4px 0; outline: none; background: transparent; font-family: inherit;
}
.test-item .answer-input:focus { border-bottom-color: #2563eb; }
.test-item .answer-text { font-size: 14px; color: #2563eb; font-weight: 500; margin-top: 2px; }
.test-item .answer-correct { color: #10b981; }
.test-item .answer-wrong   { color: #ef4444; }

/* Action bar */
.action-bar {
  max-width: 900px; margin: 0 auto; padding: 14px 32px;
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  background: #fff; border-top: 1px solid #eee; position: sticky; bottom: 0;
}
.action-bar .btn { width: auto; padding: 10px 22px; font-size: 14px; }

/* Result */
.quiz-result {
  text-align: center; padding: 40px 20px; max-width: 560px; margin: 30px auto;
  background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.1);
}
.quiz-result h2  { font-size: 26px; margin-bottom: 14px; }
.quiz-result .score  { font-size: 60px; font-weight: bold; color: #2563eb; }
.quiz-result .detail { font-size: 15px; color: #666; margin: 10px 0; }

/* Print */
@media print {
  body { background: #fff; }
  .action-bar, .settings { display: none !important; }
  .test-sheet { padding: 8px; box-shadow: none; }
  .test-item .answer-input { display: none; }
  .test-item .answer-line-print { border-bottom: 1px solid #999; height: 20px; }
  @page { margin: 10mm; }
}

/* Responsive */
@media (max-width: 640px) {
  .settings { margin: 8px; padding: 16px; }
  .test-sheet { padding: 10px; }
  .test-grid.cols-3 { grid-template-columns: 1fr 1fr; }
  .test-header h2 { font-size: 16px; }
}
</style>
</head>
<body>

<!-- ===== Settings Screen ===== -->
<div id="settingsScreen" class="settings">
  <h1 id="appTitle">でる度単語テスト</h1>

  <!-- ① データセット選択 -->
  <div class="form-group">
    <label>教材を選ぶ</label>
    <div class="dataset-selector" id="datasetSelector">
      <!-- JS で生成 -->
    </div>
    <p class="info-text" id="datasetInfo">読み込み中…</p>
  </div>

  <hr style="border:none;border-top:1px solid #e5e7eb;margin:16px 0;">

  <!-- ② 音声入力 -->
  <div class="voice-row">
    <button class="btn-mic" id="btnMic" onclick="toggleVoice()">
      <span class="mic-icon">🎤</span>
      <span id="micLabel">音声で設定する</span>
    </button>
  </div>
  <div class="voice-hint" id="voiceHint">
    例：「1番から100番、40問、ランダム、画面で」と話しかけてください
  </div>
  <div class="voice-preview" id="voicePreview"></div>

  <!-- 出題設定フォーム -->
  <div id="settingsForm">
    <div class="form-group">
      <label>出題範囲</label>
      <div class="form-row">
        <input type="number" id="rangeFrom" min="1" value="1">
        <span>〜</span>
        <input type="number" id="rangeTo"   min="1" value="100">
      </div>
    </div>

    <div class="form-group">
      <label>出題数</label>
      <div class="radio-group">
        <label><input type="radio" name="countMode" value="all"    checked onchange="toggleCountInput()"> 全て出題</label>
        <label><input type="radio" name="countMode" value="random"        onchange="toggleCountInput()"> ランダム抽出</label>
      </div>
      <div class="form-row" style="margin-top:8px;">
        <input type="number" id="wordCount" min="1" value="40" disabled>
        <span>語</span>
      </div>
    </div>

    <div class="form-group">
      <label>出題順</label>
      <div class="radio-group">
        <label><input type="radio" name="sortMode" value="sequential" checked> 順番通り</label>
        <label><input type="radio" name="sortMode" value="random"> ランダム</label>
      </div>
    </div>

    <div class="form-group">
      <label>レイアウト</label>
      <div class="radio-group">
        <label><input type="radio" name="cols" value="2" checked> ２列</label>
        <label><input type="radio" name="cols" value="3"> ３列</label>
      </div>
    </div>

    <div class="form-group">
      <label>出題方向</label>
      <div class="radio-group">
        <label><input type="radio" name="direction" value="en2ja" checked> 英語→日本語</label>
        <label><input type="radio" name="direction" value="ja2en"> 日本語→英語</label>
      </div>
    </div>

    <div class="form-group">
      <label>モード</label>
      <div class="radio-group">
        <label><input type="radio" name="mode" value="print"       checked> 印刷用テスト</label>
        <label><input type="radio" name="mode" value="interactive"> 画面上で回答</label>
      </div>
    </div>

    <p class="info-text" id="infoText"></p>
    <button class="btn btn-primary" onclick="generateTest()">テスト作成</button>
    <a href="guide.html" target="_blank"
       style="display:block;text-align:center;margin-top:12px;font-size:13px;color:#2563eb;text-decoration:none;">
      操作手順書を見る
    </a>
  </div>
</div>

<!-- ===== Test Screen ===== -->
<div id="testScreen" style="display:none;">
  <div class="test-sheet" id="testSheet"></div>
  <div class="action-bar"  id="actionBar"></div>
</div>

<!-- ===== Result Screen ===== -->
<div id="resultScreen" style="display:none;"></div>


<!-- ================================================================
     JavaScript
================================================================ -->
<script>
// ───────────────────────────────────────────────
// ① データセット管理
// ───────────────────────────────────────────────
const DATASETS = [
  { id: 'j1', label: '英検 準１級', file: 'words_j1.js' },
  { id: 'j2', label: '英検 ２級',   file: 'words_j2.js' },
];

let currentDataset = null;   // { id, label, total, words[] }
let loadedCache    = {};     // id → DATASET object

function buildDatasetSelector() {
  const sel = document.getElementById('datasetSelector');
  sel.innerHTML = '';

  DATASETS.forEach(ds => {
    const btn = document.createElement('button');
    btn.className = 'dataset-btn' + (loadedCache[ds.id] && loadedCache[ds.id].total === 0 ? ' empty' : '');
    btn.id = 'dsbtn-' + ds.id;
    btn.onclick = () => selectDataset(ds.id);

    const cached = loadedCache[ds.id];
    const countText = cached
      ? (cached.total > 0 ? `${cached.total}語` : '（準備中）')
      : '読み込み中…';

    btn.innerHTML = `<div class="ds-label">${ds.label}</div><div class="ds-count">${countText}</div>`;
    if (currentDataset && currentDataset.id === ds.id) btn.classList.add('active');
    sel.appendChild(btn);
  });

  // 「＋ 教材を追加」プレースホルダー
  const addBtn = document.createElement('button');
  addBtn.className = 'dataset-add';
  addBtn.innerHTML = '＋ 教材を追加<br><span style="font-size:10px;">（将来対応予定）</span>';
  addBtn.disabled = true;
  sel.appendChild(addBtn);
}

function selectDataset(id) {
  const ds = DATASETS.find(d => d.id === id);
  if (!ds) return;

  if (loadedCache[id]) {
    applyDataset(loadedCache[id]);
    return;
  }

  // 動的スクリプトロード
  document.getElementById('dsbtn-' + id).classList.add('loading');
  const script = document.createElement('script');
  script.src = ds.file;
  script.onload = () => {
    // words_XX.js は "const DATASET={...};" を定義する
    loadedCache[id] = window.DATASET;
    delete window.DATASET;   // グローバル汚染を避けるため即削除
    buildDatasetSelector();
    applyDataset(loadedCache[id]);
  };
  script.onerror = () => {
    document.getElementById('dsbtn-' + id).classList.remove('loading');
    alert(`${ds.label} のデータが読み込めませんでした。`);
  };
  document.head.appendChild(script);
}

function applyDataset(ds) {
  currentDataset = ds;
  document.getElementById('appTitle').textContent = `でる度単語テスト ${ds.label}`;
  const maxVal = ds.total || 1;
  document.getElementById('rangeTo').max   = maxVal;
  document.getElementById('rangeFrom').max = maxVal;
  if (parseInt(document.getElementById('rangeTo').value) > maxVal)
    document.getElementById('rangeTo').value = Math.min(100, maxVal);
  document.getElementById('datasetInfo').textContent =
    ds.total > 0 ? `${ds.total}語が利用可能です。` : 'データが未登録です。';
  buildDatasetSelector();
  updateInfo();

  if (ds.total === 0) {
    document.getElementById('settingsForm').style.opacity = '.4';
    document.getElementById('settingsForm').style.pointerEvents = 'none';
  } else {
    document.getElementById('settingsForm').style.opacity = '';
    document.getElementById('settingsForm').style.pointerEvents = '';
  }
}

// 初期ロード：準1級を自動選択
window.addEventListener('DOMContentLoaded', () => {
  buildDatasetSelector();
  selectDataset('j1');
});


// ───────────────────────────────────────────────
// ② 音声入力
// ───────────────────────────────────────────────
let recognition = null;
let isListening = false;

function initSpeech() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('btnMic').classList.add('unsupported');
    document.getElementById('micLabel').textContent = '音声入力は非対応です';
    document.getElementById('voiceHint').textContent = 'お使いのブラウザは音声入力に対応していません（Chrome 推奨）';
    return;
  }
  recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.interimResults = false;
  recognition.maxAlternatives = 3;

  recognition.onresult = e => {
    const text = Array.from(e.results[0])
      .map(alt => alt.transcript).join(' / ');
    const best = e.results[0][0].transcript;
    stopListening();
    const parsed = parseVoiceCommand(best);
    showVoicePreview(best, parsed);
  };

  recognition.onerror = e => {
    stopListening();
    if (e.error === 'no-speech') {
      showVoiceError('音声が認識されませんでした。もう一度お試しください。');
    } else if (e.error === 'not-allowed') {
      showVoiceError('マイクへのアクセスが拒否されています。ブラウザの設定をご確認ください。');
    }
  };

  recognition.onend = () => stopListening();
}

function toggleVoice() {
  if (document.getElementById('btnMic').classList.contains('unsupported')) return;
  if (!recognition) initSpeech();
  isListening ? stopListening() : startListening();
}

function startListening() {
  const btn = document.getElementById('btnMic');
  btn.classList.add('listening');
  document.getElementById('micLabel').textContent = '聞いています…（もう一度押すと停止）';
  document.getElementById('voicePreview').style.display = 'none';
  isListening = true;
  recognition.start();
}

function stopListening() {
  isListening = false;
  const btn = document.getElementById('btnMic');
  btn.classList.remove('listening');
  document.getElementById('micLabel').textContent = '音声で設定する';
  try { recognition.stop(); } catch(_) {}
}

// ── コマンドパーサー ──
function parseVoiceCommand(text) {
  const result = {};

  // 出題範囲
  const rangeM = text.match(/(\d+)\s*(?:番|問目|語目)?(?:から|〜|～)\s*(\d+)\s*(?:番|問目|語目)?/);
  if (rangeM) { result.rangeFrom = parseInt(rangeM[1]); result.rangeTo = parseInt(rangeM[2]); }

  // 出題数
  const countM = text.match(/(\d+)\s*(?:問|語|個)/);
  if (countM) { result.wordCount = parseInt(countM[1]); result.countMode = 'random'; }

  // 全部
  if (/全[部て]|すべて|全問|全単語/.test(text)) { result.countMode = 'all'; delete result.wordCount; }

  // 出題順
  if (/ランダム|バラバラ|混ぜ|シャッフル/.test(text)) result.sortMode = 'random';
  if (/順番通り|順番に|順序通り|そのまま/.test(text)) result.sortMode = 'sequential';

  // 列数
  const colsM = text.match(/([2３3二三])\s*列/);
  if (colsM) result.cols = /[3３三]/.test(colsM[1]) ? 3 : 2;

  // 方向
  if (/日本語.*英語|和訳.*英語|日英/.test(text)) result.direction = 'ja2en';
  if (/英語.*日本語|英和|英訳/.test(text)) result.direction = 'en2ja';

  // モード
  if (/印刷|プリント|紙/.test(text)) result.mode = 'print';
  if (/画面|入力|インタラクティブ|デジタル/.test(text)) result.mode = 'interactive';

  // テスト作成トリガー
  if (/作成|始め|スタート|開始|テスト/.test(text)) result.trigger = true;

  return result;
}

function showVoicePreview(heard, parsed) {
  const div = document.getElementById('voicePreview');
  if (Object.keys(parsed).length === 0 && !parsed.trigger) {
    div.style.display = 'block';
    div.innerHTML = `
      <div class="heard">認識テキスト：<span>「${heard}」</span></div>
      <div style="color:#ef4444;font-size:13px;">設定を読み取れませんでした。もう一度お試しください。</div>
      <div class="voice-actions">
        <button class="btn-retry" onclick="toggleVoice()">🎤 もう一度</button>
      </div>`;
    return;
  }

  const lines = buildPreviewLines(parsed);
  div.style.display = 'block';
  div.innerHTML = `
    <div class="heard">認識テキスト：<span>「${heard}」</span></div>
    <table>${lines}</table>
    <div class="voice-actions">
      <button class="btn-apply" onclick="applyVoiceSettings()">この設定でテスト作成</button>
      <button class="btn-retry" onclick="toggleVoice()">🎤 やり直す</button>
    </div>`;
  div.dataset.parsed = JSON.stringify(parsed);
}

function buildPreviewLines(p) {
  const total = currentDataset ? currentDataset.total : 1600;
  let rows = '';
  const rangeFrom = p.rangeFrom || parseInt(document.getElementById('rangeFrom').value);
  const rangeTo   = p.rangeTo   || parseInt(document.getElementById('rangeTo').value);
  if (p.rangeFrom || p.rangeTo)
    rows += `<tr><td>出題範囲</td><td>${rangeFrom} 〜 ${rangeTo}</td></tr>`;
  if (p.countMode === 'all')
    rows += `<tr><td>出題数</td><td>全て（${Math.max(0, rangeTo - rangeFrom + 1)}語）</td></tr>`;
  else if (p.wordCount)
    rows += `<tr><td>出題数</td><td>ランダム ${p.wordCount}語</td></tr>`;
  if (p.sortMode)
    rows += `<tr><td>出題順</td><td>${p.sortMode === 'random' ? 'ランダム' : '順番通り'}</td></tr>`;
  if (p.cols)
    rows += `<tr><td>レイアウト</td><td>${p.cols}列</td></tr>`;
  if (p.direction)
    rows += `<tr><td>出題方向</td><td>${p.direction === 'en2ja' ? '英語→日本語' : '日本語→英語'}</td></tr>`;
  if (p.mode)
    rows += `<tr><td>モード</td><td>${p.mode === 'print' ? '印刷用テスト' : '画面上で回答'}</td></tr>`;
  return rows;
}

function applyVoiceSettings() {
  const div = document.getElementById('voicePreview');
  const p = JSON.parse(div.dataset.parsed || '{}');

  if (p.rangeFrom) document.getElementById('rangeFrom').value = p.rangeFrom;
  if (p.rangeTo)   document.getElementById('rangeTo').value   = p.rangeTo;
  if (p.countMode) {
    document.querySelector(`input[name=countMode][value=${p.countMode}]`).checked = true;
    toggleCountInput();
  }
  if (p.wordCount) { document.getElementById('wordCount').value = p.wordCount; }
  if (p.sortMode)  document.querySelector(`input[name=sortMode][value=${p.sortMode}]`).checked = true;
  if (p.cols)      document.querySelector(`input[name=cols][value=${p.cols}]`).checked = true;
  if (p.direction) document.querySelector(`input[name=direction][value=${p.direction}]`).checked = true;
  if (p.mode)      document.querySelector(`input[name=mode][value=${p.mode}]`).checked = true;

  div.style.display = 'none';
  updateInfo();
  generateTest();
}

function showVoiceError(msg) {
  const div = document.getElementById('voicePreview');
  div.style.display = 'block';
  div.innerHTML = `<div style="color:#ef4444;">${msg}</div>`;
}


// ───────────────────────────────────────────────
// テスト生成・表示
// ───────────────────────────────────────────────
let testWords   = [];
let isInteractive = false;
let direction   = 'en2ja';

document.querySelectorAll('#settingsForm input').forEach(el => {
  el.addEventListener('change', updateInfo);
  el.addEventListener('input',  updateInfo);
});

function toggleCountInput() {
  const mode = document.querySelector('input[name=countMode]:checked').value;
  document.getElementById('wordCount').disabled = (mode === 'all');
  updateInfo();
}

function updateInfo() {
  if (!currentDataset) return;
  const from  = parseInt(document.getElementById('rangeFrom').value) || 1;
  const to    = parseInt(document.getElementById('rangeTo').value)   || 1;
  const mode  = document.querySelector('input[name=countMode]:checked').value;
  const count = parseInt(document.getElementById('wordCount').value) || 0;
  const total = Math.max(0, to - from + 1);
  const n     = mode === 'all' ? total : Math.min(count, total);
  document.getElementById('infoText').textContent = `現在の設定で ${n} 語出題されます。`;
}

function generateTest() {
  if (!currentDataset || currentDataset.total === 0) {
    alert('教材データが選択されていません。');
    return;
  }
  const from      = parseInt(document.getElementById('rangeFrom').value);
  const to        = parseInt(document.getElementById('rangeTo').value);
  const countMode = document.querySelector('input[name=countMode]:checked').value;
  const sortMode  = document.querySelector('input[name=sortMode]:checked').value;
  const cols      = parseInt(document.querySelector('input[name=cols]:checked').value);
  direction       = document.querySelector('input[name=direction]:checked').value;
  isInteractive   = document.querySelector('input[name=mode]:checked').value === 'interactive';

  if (from < 1 || to > currentDataset.total || from > to) {
    alert(`出題範囲を正しく入力してください（1〜${currentDataset.total}）`);
    return;
  }

  let pool = currentDataset.words.filter(w => w.id >= from && w.id <= to);
  let n;
  if (countMode === 'all') {
    n = pool.length;
  } else {
    n = parseInt(document.getElementById('wordCount').value);
    if (!n || n < 1) { alert('問題数を入力してください'); return; }
    n = Math.min(n, pool.length);
    shuffle(pool);
    pool = pool.slice(0, n);
  }

  if (sortMode === 'random') shuffle(pool);
  else pool.sort((a, b) => a.id - b.id);

  testWords = pool;
  renderTest(cols, from, to);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function renderTest(cols, from, to) {
  const today = new Date().toLocaleDateString('ja-JP');
  const sheet  = document.getElementById('testSheet');
  const label  = currentDataset ? currentDataset.label : '';

  let html = `
    <div class="test-header">
      <h2>でる度単語テスト ${label}</h2>
      <span class="score-box">&nbsp;&nbsp;&nbsp;&nbsp;/${testWords.length}</span>
    </div>
    <div class="test-meta">
      <span>Date: ${today}</span>
      <span class="range">出題範囲 ${from} 〜 ${to}</span>
    </div>
    <div class="test-grid cols-${cols}">`;

  testWords.forEach((w, i) => {
    const question = direction === 'en2ja' ? w.en : w.ja;
    html += `<div class="test-item">
      <span class="word-num">${w.id})</span>
      <div class="word-en">${question}</div>`;
    if (isInteractive) {
      html += `<input class="answer-input" data-idx="${i}" autocomplete="off" spellcheck="false">`;
    } else {
      html += `<div class="answer-line"></div>`;
    }
    html += `</div>`;
  });
  html += '</div>';
  sheet.innerHTML = html;

  const bar = document.getElementById('actionBar');
  let btns = '<button class="btn btn-secondary" onclick="backToSettings()">設定に戻る</button>';
  if (isInteractive) {
    btns += '<button class="btn btn-primary" onclick="checkAnswers()">採点する</button>';
  } else {
    btns += '<button class="btn btn-primary" onclick="window.print()">印刷</button>';
    btns += '<button class="btn btn-answer" onclick="showAnswers()">解答を表示</button>';
  }
  bar.innerHTML = btns;

  document.getElementById('settingsScreen').style.display = 'none';
  document.getElementById('testScreen').style.display = 'block';
  document.getElementById('resultScreen').style.display = 'none';
  window.scrollTo(0, 0);
}

function showAnswers() {
  document.querySelectorAll('.test-item').forEach((item, i) => {
    const w = testWords[i];
    const ans = direction === 'en2ja' ? w.ja : w.en;
    item.querySelector('.answer-line')?.remove();
    if (!item.querySelector('.answer-text')) {
      const d = document.createElement('div');
      d.className = 'answer-text';
      d.textContent = ans;
      item.appendChild(d);
    }
  });
}


// ───────────────────────────────────────────────
// 採点ロジック（案A+Bハイブリッド）
// ───────────────────────────────────────────────
function normalize(s) {
  return s
    .replace(/[\s　、，,。．.…～〜・「」『』（）()＝=：:；;！!？?]/g, '')
    .replace(/^(を|に|と|が|で|は|へ|の|も)+/g, '')
    .replace(/(を|に|と|が|で|は|へ|の|も|から|まで|より|など|ば|て|た|だ)+$/g, '')
    .replace(/(を|に|と|が|で|は|へ|の|も|から|まで|より|など|ば)/g, '')
    .replace(/していく|してくる|しておく|している/g, 'する')
    .replace(/させる|される|された|させた/g, 'する')
    .replace(/った|んだ|いた|した/g, 'る')
    .replace(/ない$/, '')
    .replace(/こと$|もの$|ところ$/, '');
}

function extractCoreWords(s) {
  const cores = s.match(/[一-龯㐀-䶿]+|[゠-ヿ]+/g);
  return cores ? cores.filter(c => c.length >= 2) : [];
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, () => Array(n+1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1]
               : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

function similarity(a, b) {
  if (!a || !b) return 0;
  return 1 - levenshtein(a, b) / Math.max(a.length, b.length);
}

function isAnswerCorrect(userAns, expected, dir, wordObj) {
  const ans = userAns.trim();
  if (!ans) return false;

  if (dir === 'ja2en') return ans.toLowerCase() === expected.toLowerCase();

  const normAns = normalize(ans);
  const normExp = normalize(expected);

  // Step 1: 正規化して完全一致
  if (normAns === normExp) return true;

  // Step 2: カンマ・スラッシュ区切りの部分一致
  const parts = expected.split(/[、，,／/]/).map(p => p.trim()).filter(Boolean);
  if (parts.some(p => normalize(p) === normAns)) return true;

  // Step 3: alt（同義語リスト）との一致
  if (wordObj?.alt) {
    if (wordObj.alt.some(a => normalize(a) === normAns)) return true;
  }

  // Step 4a: 核心語の過半数一致
  const ansCores = extractCoreWords(ans);
  const expCores = extractCoreWords(expected);
  if (expCores.length > 0 && ansCores.length > 0) {
    const matched = expCores.filter(ec =>
      ansCores.some(ac => ac === ec || ac.includes(ec) || ec.includes(ac))
    ).length;
    if (matched >= Math.ceil(expCores.length / 2) && matched >= 1) return true;
  }

  // Step 4b: 各パートとの類似度 60%以上
  if (parts.some(p => similarity(normalize(p), normAns) >= 0.6)) return true;

  // Step 4c: alt との類似度 60%以上
  if (wordObj?.alt) {
    if (wordObj.alt.some(a => similarity(normalize(a), normAns) >= 0.6)) return true;
  }

  return false;
}

function checkAnswers() {
  let correct = 0;
  document.querySelectorAll('.answer-input').forEach((input, i) => {
    const w        = testWords[i];
    const expected = direction === 'en2ja' ? w.ja : w.en;
    const userAns  = input.value.trim();
    const div      = document.createElement('div');
    div.className  = 'answer-text';

    if (!userAns) {
      div.classList.add('answer-wrong');
      div.textContent = `→ ${expected}`;
    } else if (isAnswerCorrect(userAns, expected, direction, w)) {
      div.classList.add('answer-correct');
      div.textContent = '○ ' + expected;
      correct++;
      input.style.borderBottomColor = '#10b981';
    } else {
      div.classList.add('answer-wrong');
      div.textContent = `✕ → ${expected}`;
      input.style.borderBottomColor = '#ef4444';
    }
    input.disabled = true;
    input.parentElement.appendChild(div);
  });

  const pct       = Math.round(correct / testWords.length * 100);
  const resultDiv = document.getElementById('resultScreen');
  resultDiv.innerHTML = `
    <div class="quiz-result">
      <h2>採点結果</h2>
      <div class="score">${correct}/${testWords.length}</div>
      <div class="detail">${pct}% 正解</div>
      <button class="btn btn-secondary" onclick="backToSettings()" style="max-width:300px;margin:16px auto 0;">設定に戻る</button>
      <button class="btn btn-primary"   onclick="retryWrong()"     style="max-width:300px;margin:10px auto 0;">間違えた問題を再テスト</button>
    </div>`;
  resultDiv.style.display = 'block';
  resultDiv.scrollIntoView({ behavior: 'smooth' });
  document.querySelector('.score-box').textContent = `${correct}/${testWords.length}`;
}

function retryWrong() {
  const wrong = [];
  document.querySelectorAll('.answer-input').forEach((input, i) => {
    const w = testWords[i];
    const expected = direction === 'en2ja' ? w.ja : w.en;
    if (!isAnswerCorrect(input.value.trim(), expected, direction, w)) wrong.push(w);
  });
  if (wrong.length === 0) { alert('全問正解です！'); return; }
  testWords = wrong;
  const cols = document.querySelector('.test-grid').classList.contains('cols-3') ? 3 : 2;
  isInteractive = true;
  renderTest(cols, Math.min(...wrong.map(w => w.id)), Math.max(...wrong.map(w => w.id)));
}

function backToSettings() {
  document.getElementById('settingsScreen').style.display = 'block';
  document.getElementById('testScreen').style.display     = 'none';
  document.getElementById('resultScreen').style.display   = 'none';
  window.scrollTo(0, 0);
}

initSpeech();
</script>
